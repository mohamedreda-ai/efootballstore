  <script>
  (function() {
    /* ── Shared CDN error UI — called on any library load failure ── */
    var _ls         = document.getElementById('loading-screen');
    var _loaderText = _ls ? _ls.querySelector('.ef-loader-text') : null;

    function showCDNError(msg) {
      window.__CDN_FAIL     = true;
      if (_ls) _ls.dataset.error = 'cdn';
      if (_loaderText) {
        _loaderText.textContent = msg;
        _loaderText.style.color = '#f03c3c';
      }
      var fill = _ls ? _ls.querySelector('.ef-loader-fill') : null;
      var ball = _ls ? _ls.querySelector('.ef-loader-ball') : null;
      if (fill) fill.style.animation = 'none';
      if (ball) ball.style.animation = 'none';
      if (_ls && !_ls.querySelector('.cdn-retry-btn')) {
        var btn = document.createElement('button');
        btn.className   = 'cdn-retry-btn';
        btn.textContent = '↺ إعادة المحاولة';
        btn.setAttribute('style',

          'font-family:Cairo,sans-serif;font-weight:800;' +
          'font-size:15px;cursor:pointer');
        btn.onclick = function() { location.reload(); };
        _ls.appendChild(btn);
      }
    }

    /* Expose globally so onerror attributes can call it */
    window.__showCDNError = showCDNError;

    /**
     * Injects a script tag via createElement (not document.write).
     * Calls onSuccess when the script executes, onFail on error.
     * Safe to call after DOM is ready — no document.write limitations.
     */
    window.__loadScript = function(src, onSuccess, onFail) {
      var s        = document.createElement('script');
      s.crossOrigin = 'anonymous';
      s.src         = src;
      s.onload      = onSuccess || null;
      s.onerror     = function() {
        document.head.removeChild(s);
        if (onFail) onFail();
      };
      document.head.appendChild(s);
    };

    /* ── Immediate offline detection — no spinner timeout needed ── */
    if (typeof navigator !== 'undefined' && navigator.onLine === false) {
      showCDNError('لا يوجد اتصال بالإنترنت — تحقق من الشبكة وأعد المحاولة');
    }
  })();

// ═══════════════════════════════════════════════════════════════
//  WINDOW.STORAGE SHIM — Production browser compatibility
//  The original codebase used window.storage (Claude artifact API).
//  This shim provides an identical interface backed by sessionStorage
//  so the IDB fallback path works correctly in real browsers.
//  Primary storage is always IndexedDB; this is the fallback only.
// ═══════════════════════════════════════════════════════════════
if (typeof window !== 'undefined' && !window.storage) {
  window.storage = {
    get: function(key) {
      return new Promise(function(resolve) {
        try {
          var raw = sessionStorage.getItem('ef:' + key);
          resolve(raw != null ? { key: key, value: raw } : null);
        } catch(e) { resolve(null); }
      });
    },
    set: function(key, value) {
      return new Promise(function(resolve) {
        try {
          sessionStorage.setItem('ef:' + key, value);
          resolve({ key: key, value: value });
        } catch(e) { resolve(null); } // QuotaExceededError — graceful degrade
      });
    },
    delete: function(key) {
      return new Promise(function(resolve) {
        try { sessionStorage.removeItem('ef:' + key); } catch(e) {}
        resolve({ key: key, deleted: true });
      });
    },
    list: function(prefix) {
      return new Promise(function(resolve) {
        try {
          var keys = [];
          var pfx  = prefix ? 'ef:' + prefix : 'ef:';
          for (var i = 0; i < sessionStorage.length; i++) {
            var k = sessionStorage.key(i);
            if (k && k.startsWith(pfx)) keys.push(k.slice(3)); // strip 'ef:' prefix
          }
          resolve({ keys: keys, prefix: prefix || null });
        } catch(e) { resolve({ keys: [] }); }
      });
    },
  };
}

}());

var TK_PAYLOAD_V4 = 14;
var TK_SIG_V4     = 10;
// v3 legacy constants (read-only — never issue new v3 tokens)
var TK_LEN_V3    = 18;
var TK_PAYLOAD_V3 = 14;

// ── crypto helpers ──────────────────────────────────────────────
var _cryptoKey = null; // cached CryptoKey

function _getKey() {
  if (_cryptoKey) return Promise.resolve(_cryptoKey);
  var raw = new TextEncoder().encode(SUPER_CODE + ":efootball-v4-hmac");
  return crypto.subtle.importKey("raw", raw, { name:"HMAC", hash:"SHA-256" }, false, ["sign", "verify"])
    .then(function(k) { _cryptoKey = k; return k; });
}

function _hmacSign(payload) {
  return _getKey().then(function(k) {
    return crypto.subtle.sign("HMAC", k, new TextEncoder().encode(payload));
  }).then(function(buf) {
    var bytes = new Uint8Array(buf);
    var out = "";
    for (var i = 0; i < TK_SIG_V4; i++) {
      out += SAFE[bytes[i] % 32];
    }
    return out;
  });
}

function _hmacVerify(payload, sig) {
  return _hmacSign(payload).then(function(expected) { return expected === sig; });
}

// ── legacy djb2 (v3 verification only) ─────────────────────────
function _djb2(str) {
  var h = 5381;
  for (var i = 0; i < str.length; i++) h = ((h << 5) + h + str.charCodeAt(i)) | 0;
  return (h >>> 0).toString(16).padStart(8, "0");
}
var _TOKEN_KEY_V3 = _djb2(_djb2(SUPER_CODE) + "efootball-v3");
function _signV3(payload) {
  var combined = _djb2(_TOKEN_KEY_V3 + payload);
  var result = "";
  for (var i = 0; i < 4; i++) result += SAFE[parseInt(combined.slice(i * 2, i * 2 + 2), 16) % 32];
  return result;
}

// ── base-32 helpers ─────────────────────────────────────────────
var SAFE_SET = {};
for (var _si = 0; _si < SAFE.length; _si++) { SAFE_SET[SAFE[_si]] = true; }

function b32e(n, len) {
  var s = "";
  for (var i = 0; i < len; i++) { s = SAFE[n % 32] + s; n = Math.floor(n / 32); }
  return s;
}
function b32d(s) {
  return s.split("").reduce(function(a, c) { return a * 32 + SAFE.indexOf(c); }, 0);
}

// ── public API ──────────────────────────────────────────────────

/**
 * Encode token v4 (24 chars, async).
 * Returns a Promise<string>.
 */
function encToken(sid, exp, isAdmin) {
  var expVal  = exp === null ? PERM_SEC : Math.floor(exp / 1000);
  var payload = sid + b32e(expVal, 7) + (isAdmin ? "A" : "V"); // 14 chars
  return _hmacSign(payload).then(function(sig) { return payload + sig; }); // 24 chars
}

/**
 * Decode + verify token (v4 async, v3 sync-fallback).
 * Returns Promise<{storeId, expiryMs, isAdmin}|null>.
 */
function decToken(code) {
  if (!code) return Promise.resolve(null);
  var c = code.trim().toUpperCase();
  // Reject inputs that cannot possibly be valid tokens (v3=18, v4=24 chars).
  // Guards against DoS via extremely long inputs hitting b32d/HMAC.
  if (c.length > 32) return Promise.resolve(null);

  // Validate charset
  for (var i = 0; i < c.length; i++) {
    if (!SAFE_SET[c[i]]) return Promise.resolve(null);
  }

  // ── v4 path ────────────────────────────────────────────────────
  if (c.length === TK_LEN_V4) {
    var payload4  = c.slice(0, TK_PAYLOAD_V4);
    var sig4      = c.slice(TK_PAYLOAD_V4);
    var role4     = payload4[13];
    if (role4 !== "V" && role4 !== "A") return Promise.resolve(null);
    return _hmacVerify(payload4, sig4).then(function(ok) {
      if (!ok) return null;
      var n = b32d(payload4.slice(6, 13));
      return { storeId: payload4.slice(0, 6), expiryMs: n >= PERM_SEC ? null : n * 1000, isAdmin: role4 === "A" };
    });
  }

  // ── v3 legacy path (sync wrapped in Promise) ───────────────────
  if (c.length === TK_LEN_V3) {
    var payload3  = c.slice(0, TK_PAYLOAD_V3);
    var sigGiven3 = c.slice(TK_PAYLOAD_V3);
    var role3     = payload3[13];
    if (role3 !== "V" && role3 !== "A") return Promise.resolve(null);
    if (sigGiven3 !== _signV3(payload3)) return Promise.resolve(null);
    var n3 = b32d(payload3.slice(6, 13));
    return Promise.resolve({ storeId: payload3.slice(0, 6), expiryMs: n3 >= PERM_SEC ? null : n3 * 1000, isAdmin: role3 === "A" });
  }

  return Promise.resolve(null);
}

/**
 * Generates a cryptographically random store ID using crypto.getRandomValues.
 */
function genStoreId() {
  var arr = new Uint8Array(6);
  crypto.getRandomValues(arr);
  var result = "";
  for (var i = 0; i < 6; i++) result += SAFE[arr[i] % 32];
  return result;
}


/**
 * Generates a collision-resistant unique ID:
 * timestamp (ms) + 6 random base-32 chars = ~1.07 billion combinations/ms.
 * Eliminates the Date.now() collision risk under concurrent operations.
 */
function genUID() {
  // 6 random base-32 chars = 32^6 ≈ 1.07B combinations per ms timestamp.
  // Increased from 4 to reduce collision probability on fast hardware.
  var arr = new Uint8Array(6);
  crypto.getRandomValues(arr);
  var rand = "";
  for (var i = 0; i < 6; i++) rand += SAFE[arr[i] % 32];
  return String(Date.now()) + rand;
}

function verifySuperCode(input) {
  return input.trim().toUpperCase() === SUPER_CODE;
}

// ═══════════════════════════════════════════════════════════════
//  RATE LIMITER
// ═══════════════════════════════════════════════════════════════
var RL_MAX = 5;
var RL_WIN = 300000; // 5 minutes

function RateLimiter() {
  this._log = {};
}
RateLimiter.prototype.check = function(key) {
  var now = Date.now();
  // Evict expired entries to prevent unbounded growth
  var log = this._log;
  Object.keys(log).forEach(function(k) {
    if (now - log[k].first > RL_WIN) delete log[k];
  });
  var rec = this._log[key] || { count: 0, first: now };
  if (now - rec.first > RL_WIN) {
    this._log[key] = { count: 1, first: now };
    return true;
  }
  if (rec.count >= RL_MAX) return false;
  this._log[key] = { count: rec.count + 1, first: rec.first };
  return true;
};
RateLimiter.prototype.cooldown = function(key) {
  var rec = this._log[key];
  if (!rec) return 0;
  return Math.max(0, Math.ceil((rec.first + RL_WIN - Date.now()) / 1000));
};
RateLimiter.prototype.reset = function(key) {
  delete this._log[key];
};

var authLimiter = new RateLimiter();

// ═══════════════════════════════════════════════════════════════
//  STORAGE LAYER v2 — IndexedDB + AES-256-GCM + Dynamic Key
//
//  Architecture:
//    • IndexedDB as primary store (no size limits, binary-safe)
//    • window.storage as secondary fallback (artifact env)
//    • AES-256-GCM encryption with PBKDF2-derived key
//    • Key derived from USER password (entered at login)
//      so data is unreadable without the password
//    • In-memory MEM cache for instant repeated reads
// ═══════════════════════════════════════════════════════════════
var MEM = {};
var _migratedKeys = {}; // tracks IDB migration per session

// ── Dynamic encryption key (set from user password at login) ──
var _encKey     = null;
var _encKeyPass = null; // the password string that produced _encKey

/**
 * Derives AES-256-GCM key from a password string via PBKDF2.
 * Returns Promise<CryptoKey>.
 */
function _deriveKey(password) {
  var enc  = new TextEncoder();
  // Salt includes the first 8 chars of password (not just length) to
  // ensure different passwords of the same length produce different keys.
  // A random salt would be ideal but requires external storage; this is
  // a pragmatic improvement within the client-only architecture.
  var saltStr = "efootball-idb-v2:" + password.slice(0, 8) + ":" + password.length;
  var salt = enc.encode(saltStr);
  return crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"])
    .then(function(base) {
      return crypto.subtle.deriveKey(
        { name:"PBKDF2", salt:salt, iterations:100000, hash:"SHA-256" },
        base,
        { name:"AES-GCM", length:256 },
        false, ["encrypt","decrypt"]
      );
    });
}

/** Call this once the user proves their identity (password/super-code). */
function setEncryptionPassword(password) {
  if (_encKeyPass === password && _encKey) return Promise.resolve(_encKey);
  return _deriveKey(password || SUPER_CODE).then(function(k) {
    _encKey     = k;
    _encKeyPass = password;
    return k;
  });
}

function _getEncKey() {
  if (_encKey) return Promise.resolve(_encKey);
  // Fallback: derive from SUPER_CODE (pre-login reads, backward compat)
  return _deriveKey(SUPER_CODE).then(function(k) {
    if (!_encKey) { _encKey = k; _encKeyPass = SUPER_CODE; }
    return _encKey;
  });
}

var _cryptoAvailable = typeof crypto !== "undefined"
  && typeof crypto.subtle !== "undefined"
  && typeof window !== "undefined";

function _encrypt(plain) {
  if (!_cryptoAvailable) {
    console.warn("[_encrypt] WebCrypto unavailable — storing data unencrypted. Upgrade browser for full security.");
    return Promise.resolve(plain);
  }
  var iv = crypto.getRandomValues(new Uint8Array(12));
  return _getEncKey().then(function(k) {
    return crypto.subtle.encrypt(
      { name:"AES-GCM", iv:iv },
      k,
      new TextEncoder().encode(plain)
    );
  }).then(function(buf) {
    var out = new Uint8Array(12 + buf.byteLength);
    out.set(iv, 0);
    out.set(new Uint8Array(buf), 12);
    // Use chunked btoa to avoid call-stack overflow on large data
    var binary = "";
    var chunk  = 8192;
    for (var i = 0; i < out.length; i += chunk) {
      binary += String.fromCharCode.apply(null, out.subarray(i, i + chunk));
    }
    return btoa(binary);
  }).catch(function(e) {
    console.error("[Encrypt]", e);
    return plain;
  });
}

function _decrypt(cipher) {
  if (!_cryptoAvailable) return Promise.resolve(cipher);
  try {
    var binary = atob(cipher);
    var bytes  = new Uint8Array(binary.length);
    for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    if (bytes.length < 13) return Promise.resolve(cipher);
    var iv = bytes.slice(0, 12);
    var ct = bytes.slice(12);
    return _getEncKey().then(function(k) {
      return crypto.subtle.decrypt({ name:"AES-GCM", iv:iv }, k, ct);
    }).then(function(buf) {
      return new TextDecoder().decode(buf);
    }).catch(function() { return cipher; });
  } catch(e) { return Promise.resolve(cipher); }
}

// ── IndexedDB wrapper ──────────────────────────────────────────
var _idb = null; // cached IDBDatabase

function _openIDB() {
  if (_idb) return Promise.resolve(_idb);
  return new Promise(function(resolve, reject) {
    if (typeof indexedDB === "undefined") { resolve(null); return; }
    try {
      var req = indexedDB.open("efootball-store", 2);
      req.onupgradeneeded = function(e) {
        var db = e.target.result;
        if (!db.objectStoreNames.contains("kv")) {
          db.createObjectStore("kv", { keyPath:"k" });
        }
        if (!db.objectStoreNames.contains("images")) {
          db.createObjectStore("images", { keyPath:"k" });
        }
      };
      req.onsuccess = function(e) {
        _idb = e.target.result;
        // Reset on forced close (browser eviction, version conflict) so
        // the next operation re-opens a fresh connection automatically.
        _idb.onclose = function() { _idb = null; };
        _idb.onerror = function(ev) { console.error("[IDB error]", ev); };
        resolve(_idb);
      };
      req.onerror   = function()  { resolve(null); }; // graceful fallback
    } catch(e) { resolve(null); }
  });
}

function _idbGet(store, key) {
  return _openIDB().then(function(db) {
    if (!db) return null;
    return new Promise(function(resolve) {
      try {
        var tx  = db.transaction(store, "readonly");
        var req = tx.objectStore(store).get(key);
        req.onsuccess = function() { resolve(req.result ? req.result.v : null); };
        req.onerror   = function() { resolve(null); };
      } catch(e) { resolve(null); }
    });
  });
}

function _idbSet(store, key, value) {
  return _openIDB().then(function(db) {
    if (!db) return false;
    return new Promise(function(resolve) {
      try {
        var tx  = db.transaction(store, "readwrite");
        var req = tx.objectStore(store).put({ k:key, v:value });
        req.onsuccess = function() { resolve(true); };
        req.onerror   = function() { resolve(false); };
      } catch(e) { resolve(false); }
    });
  });
}

function _idbDelete(store, key) {
  return _openIDB().then(function(db) {
    if (!db) return;
    return new Promise(function(resolve) {
      try {
        var tx  = db.transaction(store, "readwrite");
        tx.objectStore(store).delete(key);
        tx.oncomplete = function() { resolve(); };
        tx.onerror    = function() { resolve(); };
      } catch(e) { resolve(); }
    });
  });
}

// ── High-level JSON store (encrypted) ─────────────────────────
function dbGet(k, signal) {
  return new Promise(function(resolve) {
    if (signal && signal.aborted) { resolve(null); return; }

    // 1. Try IndexedDB first
    _idbGet("kv", k).then(function(cipher) {
      if (signal && signal.aborted) { resolve(null); return; }
      if (cipher != null) {
        return _decrypt(cipher).then(function(plain) {
          try {
            var v = JSON.parse(plain);
            MEM[k] = v;
            resolve(v);
          } catch(e) {
            console.error("[dbGet] corrupt IDB entry for key:", k);
            resolve(null); // return null — let caller use default
          }
        }).catch(function(decryptErr) {
          // Decryption failure: key may have changed. Return null.
          console.error("[dbGet] decrypt failed for key:", k);
          resolve(null);
        });
      }
      // 2. Fallback to window.storage (artifact/legacy env)
      try {
        return window.storage.get(k).then(function(r) {
          if (signal && signal.aborted) { resolve(null); return; }
          if (r && r.value != null) {
            return _decrypt(r.value).then(function(plain) {
              try {
                var v = JSON.parse(plain);
                MEM[k] = v;
                // Migrate to IDB once per session per key
                if (!_migratedKeys[k]) {
                  _migratedKeys[k] = true;
                  _idbSet("kv", k, r.value).catch(function(){});
                }
                resolve(v);
              } catch(e) { resolve(MEM[k] != null ? MEM[k] : null); }
            });
          }
          resolve(MEM[k] != null ? MEM[k] : null);
        }).catch(function() { resolve(MEM[k] != null ? MEM[k] : null); });
      } catch(e) { resolve(MEM[k] != null ? MEM[k] : null); }
    }).catch(function() { resolve(MEM[k] != null ? MEM[k] : null); });
  });
}

function dbSet(k, d) {
  // MEM is the synchronous source of truth for useSyncExternalStore.
  // The IDB write is an async durability write; UI reflects MEM immediately.
  // Callers receive Promise.resolve(true) once MEM is updated — if the IDB
  // write subsequently fails it is logged and the data remains in MEM for the
  // current session (it will be lost on page reload if IDB is unavailable).
  MEM[k] = d;
  var plain = JSON.stringify(d);
  _encrypt(plain).then(function(cipher) {
    // Primary: IndexedDB
    _idbSet("kv", k, cipher).catch(function(e) {
      console.error("[dbSet] IDB write failed for key:", k, e);
    });
    // Secondary fallback: window.storage (artifact/legacy env)
    try { window.storage.set(k, cipher).catch(function(e) {
      console.error("[dbSet] window.storage fallback failed for key:", k, e);
    }); } catch(e) {}
  }).catch(function(e) { console.error("[dbSet] encrypt failed for key:", k, e); });
  return Promise.resolve(true);
}

// ── Binary/Image store (un-encrypted, stored as-is in IDB) ────
var ImageDB = {
  save: function(key, dataUrl) {
    if (!dataUrl) return Promise.resolve(false);
    return _idbSet("images", key, dataUrl).catch(function(e) {
      console.error("[ImageDB.save]", e);
      return false;
    });
  },
  load: function(key) {
    return _idbGet("images", key).catch(function() { return null; });
  },
  remove: function(key) {
    return _idbDelete("images", key).catch(function() {});
  },
};

// ═══════════════════════════════════════════════════════════════
//  WATERMARK ENGINE  (Canvas API)
//  Applies a semi-transparent store-name watermark to any image
//  uploaded by the admin. Runs entirely in the browser.
// ═══════════════════════════════════════════════════════════════
var WatermarkAPI = {
  /**
   * Applies watermark to a dataURL image.
   * @param {string} dataUrl   — source image as data URL
   * @param {string} storeName — text to stamp
   * @param {object} opts      — { opacity, fontSize, color, position }
   * Returns Promise<string>   — watermarked image as data URL (PNG)
   */
  apply: function(dataUrl, storeName, opts) {
    opts = Object.assign({
      opacity:  0.35,
      fontSize: 22,
      color:    "#ffffff",
      position: "bottomRight", // "bottomRight" | "center" | "tile"
    }, opts || {});

    return new Promise(function(resolve, reject) {
      try {
        var img = new Image();
        img.onload = function() {
          try {
            var canvas  = document.createElement("canvas");
            canvas.width  = img.naturalWidth;
            canvas.height = img.naturalHeight;
            var ctx = canvas.getContext("2d");
            if (!ctx) { resolve(dataUrl); return; }

            // Draw original image
            ctx.drawImage(img, 0, 0);

            // Watermark text setup
            var text     = "⚽ " + storeName;
            var fontSize = Math.max(14, Math.min(opts.fontSize, canvas.width * 0.06));
            ctx.font        = "bold " + fontSize + "px Cairo, Arial, sans-serif";
            ctx.fillStyle   = opts.color;
            ctx.globalAlpha = opts.opacity;
            ctx.textBaseline = "middle";

            var textW = ctx.measureText(text).width;
            var pad   = fontSize * 0.8;
            var tw    = textW + pad * 2;
            var th    = fontSize * 1.8;

            if (opts.position === "tile") {
              // Diagonal tiled pattern
              ctx.save();
              ctx.translate(canvas.width / 2, canvas.height / 2);
              ctx.rotate(-Math.PI / 6);
              var stepX = tw * 1.6;
              var stepY = th * 2.4;
              for (var ty = -canvas.height; ty < canvas.height * 2; ty += stepY) {
                for (var tx = -canvas.width; tx < canvas.width * 2; tx += stepX) {
                  ctx.fillText(text, tx, ty);
                }
              }
              ctx.restore();
            } else if (opts.position === "center") {
              ctx.textAlign = "center";
              // Semi-transparent banner
              ctx.globalAlpha = opts.opacity * 0.5;
              ctx.fillStyle   = "#000000";
              ctx.fillRect(0, canvas.height / 2 - th / 2, canvas.width, th);
              ctx.globalAlpha = opts.opacity;
              ctx.fillStyle   = opts.color;
              ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            } else {
              // Bottom-right with shadow
              var x = canvas.width  - textW - pad;
              var y = canvas.height - th / 2 - pad;
              // Dark background pill
              ctx.globalAlpha = opts.opacity * 0.6;
              ctx.fillStyle   = "#000000";
              var r = fontSize * 0.4;
              ctx.beginPath();
              ctx.moveTo(x - pad + r, y - th / 2);
              ctx.lineTo(x + textW + pad - r, y - th / 2);
              ctx.arcTo(x + textW + pad, y - th / 2, x + textW + pad, y, r);
              ctx.lineTo(x + textW + pad, y + th / 2 - r);
              ctx.arcTo(x + textW + pad, y + th / 2, x + textW + pad - r, y + th / 2, r);
              ctx.lineTo(x - pad + r, y + th / 2);
              ctx.arcTo(x - pad, y + th / 2, x - pad, y, r);
              ctx.lineTo(x - pad, y - th / 2 + r);
              ctx.arcTo(x - pad, y - th / 2, x - pad + r, y - th / 2, r);
              ctx.closePath();
              ctx.fill();
              ctx.globalAlpha = opts.opacity;
              ctx.fillStyle   = opts.color;
              ctx.textAlign   = "left";
              ctx.fillText(text, x, y);
            }

            ctx.globalAlpha = 1;
            var result = canvas.toDataURL("image/png", 0.92);
            // Release canvas resources
            canvas.width = 0; canvas.height = 0;
            resolve(result);
          } catch(e) {
            console.error("[Watermark canvas]", e);
            resolve(dataUrl); // return original on any error
          }
        };
        img.onerror = function() { resolve(dataUrl); };
        img.src = dataUrl;
      } catch(e) {
        console.error("[Watermark load]", e);
        resolve(dataUrl);
      }
    });
  },

  /**
   * Reads a File/Blob, applies watermark, returns data URL.
   */
  fromFile: function(file, storeName, opts) {
    return new Promise(function(resolve, reject) {
      var ALLOWED_TYPES = { "image/jpeg":1, "image/png":1, "image/webp":1, "image/gif":1 };
      if (!file || !ALLOWED_TYPES[file.type]) {
        reject(new Error("الملف ليس صورة صالحة — يُقبل: JPG, PNG, WEBP, GIF"));
        return;
      }
      if (file.size > 10 * 1024 * 1024) {
        reject(new Error("حجم الصورة يتجاوز 10 MB"));
        return;
      }
      var reader = new FileReader();
      reader.onload  = function(e) {
        WatermarkAPI.apply(e.target.result, storeName, opts)
          .then(resolve).catch(reject);
      };
      reader.onerror = function() { reject(new Error("فشل قراءة الصورة")); };
      reader.readAsDataURL(file);
    });
  },
};

var AccountsAPI = {
  load: function(sid, signal) {
    return dbGet("efacc" + sid, signal).then(function(r) { return r || []; });
  },
  save: function(sid, d) { return dbSet("efacc" + sid, d); },
};

var HistoryAPI = {
  load: function(signal) {
    return dbGet("efhist", signal).then(function(r) { return r || []; });
  },
  save: function(d) { return dbSet("efhist", d); },
};

// ═══════════════════════════════════════════════════════════════
//  AUDIT LOG API
//  Records every significant action with timestamp + actor role
// ═══════════════════════════════════════════════════════════════
var AuditAPI = {
  // In-memory write queue: buffers concurrent appends before flush
  _pending:  {},
  // Per-storeId debounce timers — prevents one store from resetting
  // another store's flush window under concurrent audit events.
  _timers:   {},

  load: function(sid) { return dbGet("efaudit" + sid).then(function(r) { return r || []; }); },

  append: function(sid, action) {
    // Accumulate synchronously in memory, then flush once to IDB.
    // This eliminates the read-before-write race condition under
    // concurrent audit events (e.g. bulk delete + notification).
    if (!AuditAPI._pending[sid]) AuditAPI._pending[sid] = [];
    var entry = Object.assign({ ts: Date.now() }, action);
    AuditAPI._pending[sid].unshift(entry);

    // Per-storeId debounce: each store has its own 50ms flush window.
    // Previously a single shared timer meant store B's activity reset
    // store A's timer, potentially delaying or dropping audit entries.
    clearTimeout(AuditAPI._timers[sid]);
    AuditAPI._timers[sid] = setTimeout(function() {
      var pendingForSid = AuditAPI._pending[sid];
      if (!pendingForSid || !pendingForSid.length) return;
      delete AuditAPI._pending[sid];
      delete AuditAPI._timers[sid];
      dbGet("efaudit" + sid).then(function(log) {
        var next = pendingForSid.concat(log || []).slice(0, 200);
        dbSet("efaudit" + sid, next);
      }).catch(function(e) { console.error("[AuditAPI flush]", e); });
    }, 50);

    return Promise.resolve(true);
  },
};

// ═══════════════════════════════════════════════════════════════
//  BACKUP & RESTORE
// ═══════════════════════════════════════════════════════════════
var BackupAPI = {
  /**
   * Exports all store data + history as encrypted JSON blob.
   * Returns a Promise that triggers a file download.
   */
  export: function() {
    return dbGet("efhist").then(function(hist) {
      hist = hist || [];
      return Promise.all(hist.map(function(h) {
        return dbGet("efacc" + h.storeId).then(function(accs) {
          return { meta: h, accounts: accs || [] };
        });
      }));
    }).then(function(stores) {
      var payload = JSON.stringify({
        version:   "ef-backup-v1",
        exportedAt: new Date().toISOString(),
        stores:    stores,
      }, null, 2);
      var blob = new Blob([payload], { type:"application/json;charset=utf-8" });
      var url  = URL.createObjectURL(blob);
      var a    = document.createElement("a");
      a.href   = url;
      a.download = "efootball-backup-" + new Date().toISOString().slice(0, 10) + ".json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });
  },

  /**
   * Imports a backup JSON file, merging stores (no duplicates by storeId).
   * Returns Promise<{ imported, skipped }>.
   */
  import: function(file) {
    return new Promise(function(resolve, reject) {
      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var data = JSON.parse(e.target.result);
          // Full schema validation — reject malformed or malicious payloads
          if (!data.version || !Array.isArray(data.stores)) throw new Error("invalid");
          if (!data.version.startsWith("ef-backup-")) throw new Error("invalid version");
          data.stores.forEach(function(s) {
            if (!s || typeof s !== "object") throw new Error("invalid store entry");
            if (!s.meta || typeof s.meta !== "object") throw new Error("invalid store meta");
            if (typeof s.meta.storeId !== "string" || !/^[A-Z2-9]{6}$/.test(s.meta.storeId)) {
              throw new Error("invalid storeId");
            }
            if (!Array.isArray(s.accounts)) throw new Error("accounts must be array");
            if (s.accounts.length > 10000) throw new Error("account list too large");
          });
          resolve(data);
        } catch(err) { reject(new Error("ملف غير صالح")); }
      };
      reader.onerror = function() { reject(new Error("فشل قراءة الملف")); };
      reader.readAsText(file);
    }).then(function(data) {
      return dbGet("efhist").then(function(existingHist) {
        existingHist = existingHist || [];
        var existingIds = {};
        existingHist.forEach(function(h) { existingIds[h.storeId] = true; });

        var toAdd    = data.stores.filter(function(s) { return !existingIds[s.meta.storeId]; });
        var skipped  = data.stores.length - toAdd.length;

        return Promise.all(toAdd.map(function(s) {
          // Sanitize all freeform text fields in imported accounts
          // before persisting — treat imported data as untrusted.
          var sanitizedAccounts = s.accounts.map(function(a) {
            if (!a || typeof a !== "object") return null;
            return Object.assign({}, a, {
              players:    sanitizeText(String(a.players    || "")),
              gp:         sanitizeText(String(a.gp         || "")),
              notes:      sanitizeText(String(a.notes      || "")),
              whatsapp:   sanitizePhone(String(a.whatsapp  || "")),
              basePrice:  String(Math.max(0, parseFloat(a.basePrice)  || 0)),
              commission: String(Math.max(0, parseFloat(a.commission) || 0)),
              price:      String(Math.max(0, parseFloat(a.price)      || 0)),
            });
          }).filter(Boolean);
          return dbSet("efacc" + s.meta.storeId, sanitizedAccounts);
        })).then(function() {
          var newHist = existingHist.concat(toAdd.map(function(s) { return s.meta; }));
          return dbSet("efhist", newHist).then(function() {
            return { imported: toAdd.length, skipped: skipped };
          });
        });
      });
    });
  },
};

// ═══════════════════════════════════════════════════════════════
//  INTERNAL NOTIFICATIONS CENTER
//  Persistent, per-store notification history stored in storage.
//  Works offline, no browser permission needed.
// ═══════════════════════════════════════════════════════════════
var InternalNotifAPI = {
  _key: function(storeId) { return "efnotifs" + (storeId || "global"); },

  load: function(storeId) {
    return dbGet(InternalNotifAPI._key(storeId)).then(function(r) { return r || []; });
  },

  // In-memory accumulator to prevent lost notifications from concurrent pushes
  _buf: {},

  push: function(storeId, notif) {
    var key = InternalNotifAPI._key(storeId);
    if (!InternalNotifAPI._buf[key]) InternalNotifAPI._buf[key] = [];
    var entry = Object.assign({ id: genUID(), ts: Date.now(), read: false }, notif);
    InternalNotifAPI._buf[key].unshift(entry);

    // Per-key debounce: each notification key (storeId) has its own
    // 30ms flush window. Prevents cross-store timer stomping.
    if (!InternalNotifAPI._timers) InternalNotifAPI._timers = {};
    clearTimeout(InternalNotifAPI._timers[key]);
    InternalNotifAPI._timers[key] = setTimeout(function() {
      var pending = InternalNotifAPI._buf[key];
      if (!pending || !pending.length) return;
      delete InternalNotifAPI._buf[key];
      delete InternalNotifAPI._timers[key];
      dbGet(key).then(function(list) {
        var next = pending.concat(list || []).slice(0, 100);
        dbSet(key, next);
      }).catch(function(e) { console.error("[InternalNotifAPI flush]", e); });
    }, 30);

    return Promise.resolve(true);
  },

  markRead: function(storeId, id) {
    return InternalNotifAPI.load(storeId).then(function(list) {
      var next = list.map(function(n) { return n.id === id ? Object.assign({}, n, { read: true }) : n; });
      return dbSet(InternalNotifAPI._key(storeId), next);
    });
  },

  markAllRead: function(storeId) {
    return InternalNotifAPI.load(storeId).then(function(list) {
      var next = list.map(function(n) { return Object.assign({}, n, { read: true }); });
      return dbSet(InternalNotifAPI._key(storeId), next);
    });
  },

  clear: function(storeId) {
    return dbSet(InternalNotifAPI._key(storeId), []);
  },

  unreadCount: function(list) {
    return (list || []).filter(function(n) { return !n.read; }).length;
  },
};

// ═══════════════════════════════════════════════════════════════
//  WAITLIST API
//  Buyers can register interest when no accounts are available.
//  Each entry: { id, name, whatsapp, note, ts, storeId, notified }
// ═══════════════════════════════════════════════════════════════
var WaitlistAPI = {
  _key: function(storeId) { return "efwait" + storeId; },

  load: function(storeId) {
    return dbGet(WaitlistAPI._key(storeId)).then(function(r) { return r || []; });
  },

  add: function(storeId, entry) {
    return WaitlistAPI.load(storeId).then(function(list) {
      // prevent duplicate by whatsapp number
      var wa = (entry.whatsapp || "").replace(/[^0-9]/g, "");
      var dup = list.some(function(e) { return (e.whatsapp || "").replace(/[^0-9]/g, "") === wa && wa.length >= 7; });
      if (dup) return Promise.resolve({ added: false, reason: "duplicate" });
      var item = Object.assign({}, entry, {
        id:       genUID(),
        ts:       Date.now(),
        notified: false,
        name:     sanitizeText(entry.name     || ""),
        note:     sanitizeText(entry.note     || ""),
        whatsapp: sanitizePhone(entry.whatsapp || ""),
        // ── New fields — always sanitized at persistence boundary ──
        players:  sanitizeText(entry.players  || ""),
        minPrice: sanitizeText(String(entry.minPrice || "")),
        maxPrice: sanitizeText(String(entry.maxPrice || "")),
        gp:       sanitizeText(entry.gp       || ""),
      });
      return dbSet(WaitlistAPI._key(storeId), [item].concat(list))
        .then(function() {
          // fire internal notification to admin
          return InternalNotifAPI.push(storeId, {
            type:  "waitlist",
            title: "طلب انتظار جديد",
            body:  (item.name || "عميل") + " يريد حساباً" + (item.note ? " — " + item.note : ""),
          }).then(function() {
            // Telegram notification (non-blocking, best-effort)
            TelegramAPI.notifyWaitlist(storeId, entry, "").catch(function(e){ console.error("[TG notifyWaitlist]", e); });
          });
        })
        .then(function() { return { added: true }; });
    });
  },

  markNotified: function(storeId, id) {
    // Use load() to read the authoritative IDB state rather than the potentially
    // stale MEM cache. The optimistic UI update in useWaitlist.reload() means the
    // user sees the change immediately while this write persists to IDB.
    return WaitlistAPI.load(storeId).then(function(list) {
      var next = list.map(function(e) {
        return e.id === id ? Object.assign({}, e, { notified: true }) : e;
      });
      return dbSet(WaitlistAPI._key(storeId), next);
    });
  },

  remove: function(storeId, id) {
    return WaitlistAPI.load(storeId).then(function(list) {
      return dbSet(WaitlistAPI._key(storeId), list.filter(function(e) { return e.id !== id; }));
    });
  },
};


// ═══════════════════════════════════════════════════════════════
//  ACCOUNT REQUEST API  (طلبات الحسابات)
//  Buyers submit specific account requests with full requirements.
//  Each request: { id, name, whatsapp, minPrice, maxPrice,
//                  players, minGp, note, ts, status, readAt }
//  status: "new" | "seen" | "fulfilled" | "rejected"
// ═══════════════════════════════════════════════════════════════
var AccountRequestAPI = {
  _key: function(storeId) { return "efaccreq" + storeId; },

  load: function(storeId) {
    return dbGet(AccountRequestAPI._key(storeId)).then(function(r) { return r || []; });
  },

  // Buyer submits a request — rate-limited by WhatsApp number (1 pending per number)
  add: function(storeId, entry) {
    return AccountRequestAPI.load(storeId).then(function(list) {
      var wa = (entry.whatsapp || "").replace(/[^0-9]/g, "");
      // Prevent duplicate pending requests from same number
      var hasPending = list.some(function(r) {
        return (r.whatsapp || "").replace(/[^0-9]/g, "") === wa
          && wa.length >= 7
          && r.status === "new";
      });
      if (hasPending) return { added: false, reason: "duplicate" };

      var item = {
        id:        genUID(),
        ts:        Date.now(),
        status:    "new",
        name:      sanitizeText(entry.name      || ""),
        whatsapp:  sanitizePhone(entry.whatsapp  || ""),
        minPrice:  Math.max(0, parseInt(entry.minPrice)  || 0),
        maxPrice:  Math.max(0, parseInt(entry.maxPrice)  || 0),
        players:   sanitizeText(entry.players    || ""),
        minGp:     sanitizeText(entry.minGp      || ""),
        note:      sanitizeText(entry.note        || ""),
      };
      // Validate price range
      if (item.maxPrice > 0 && item.minPrice > item.maxPrice) {
        var tmp = item.minPrice; item.minPrice = item.maxPrice; item.maxPrice = tmp;
      }

      return dbSet(AccountRequestAPI._key(storeId), [item].concat(list))
        .then(function() {
          // Push internal notification to admin
          var reqSummary = [];
          if (item.players) reqSummary.push("لاعبين: " + item.players.slice(0, 40));
          if (item.minPrice > 0 || item.maxPrice > 0) {
            reqSummary.push("سعر: " + (item.minPrice > 0 ? item.minPrice : "أي") + (item.maxPrice > 0 ? "–" + item.maxPrice : "+") + " ج");
          }
          if (item.minGp)    reqSummary.push("GP: " + item.minGp.slice(0, 30));
          if (item.note)     reqSummary.push(item.note.slice(0, 50));

          return InternalNotifAPI.push(storeId, {
            type:  "account_request",
            title: "🎯 طلب حساب جديد من " + (item.name || "عميل"),
            body:  reqSummary.length ? reqSummary.join(" · ") : "طلب بدون تفاصيل إضافية",
          }).then(function() {
            // Telegram notification (non-blocking)
            TelegramAPI.notifyAccountRequest(storeId, item).catch(function(e){ console.error("[AccountRequestAPI] Telegram notify failed:", e); });
          });
        })
        .then(function() { return { added: true }; });
    });
  },

  // Admin marks a request as seen.
  // Always reads from IDB (via load) to ensure consistency — the hook
  // applies the optimistic UI update before this IDB write completes.
  markSeen: function(storeId, id) {
    return AccountRequestAPI.load(storeId).then(function(list) {
      var next = list.map(function(r) {
        return r.id === id && r.status === "new"
          ? Object.assign({}, r, { status: "seen", readAt: Date.now() })
          : r;
      });
      return dbSet(AccountRequestAPI._key(storeId), next);
    });
  },

  // Admin updates request status: "fulfilled" | "rejected" | "new"
  setStatus: function(storeId, id, status) {
    var key = AccountRequestAPI._key(storeId);
    return AccountRequestAPI.load(storeId).then(function(list) {
      var next = list.map(function(r) {
        return r.id === id ? Object.assign({}, r, { status: status }) : r;
      });
      return dbSet(key, next);
    });
  },

  // Admin removes a request
  remove: function(storeId, id) {
    var key = AccountRequestAPI._key(storeId);
    return AccountRequestAPI.load(storeId).then(function(list) {
      return dbSet(key, list.filter(function(r) { return r.id !== id; }));
    });
  },

  // Count unread (status === "new") requests
  unreadCount: function(list) {
    return (list || []).filter(function(r) { return r.status === "new"; }).length;
  },
};

// ═══════════════════════════════════════════════════════════════
//  PUSH NOTIFICATIONS
// ═══════════════════════════════════════════════════════════════
var NotifAPI = {
  isSupported: function() {
    return typeof Notification !== "undefined";
  },
  isGranted: function() {
    return NotifAPI.isSupported() && Notification.permission === "granted";
  },
  request: function() {
    if (!NotifAPI.isSupported()) return Promise.resolve("denied");
    return Notification.requestPermission();
  },
  send: function(title, body, tag) {
    if (!NotifAPI.isGranted()) return;
    try {
      new Notification(title, {
        body:  body,
        icon:  "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='28' font-size='28'%3E⚽%3C/text%3E%3C/svg%3E",
        tag:   tag || "efootball",
        badge: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='28' font-size='28'%3E⚽%3C/text%3E%3C/svg%3E",
      });
    } catch(e) {}
  },
  scheduleExpiryAlert: function(storeName, expiryMs) {
    if (!NotifAPI.isGranted() || !expiryMs) return;
    var WARN_BEFORE = 24 * 60 * 60 * 1000; // 24 hours
    var left = expiryMs - Date.now();
    if (left > WARN_BEFORE || left <= 0) return;
    // Already within warning window — send now if not sent today
    var key = "notif-sent-" + storeName;
    try { if (sessionStorage.getItem(key)) return; sessionStorage.setItem(key, "1"); } catch(e) {}
    var hours = Math.ceil(left / 3600000);
    NotifAPI.send(
      "⏰ " + storeName + " — تنبيه انتهاء الصلاحية",
      "ينتهي هذا الستور خلال " + hours + " ساعة تقريباً",
      "expiry-" + storeName
    );
  },
};

// ═══════════════════════════════════════════════════════════════
//  TELEGRAM BOT API
//  Sends instant notifications to the store admin's Telegram chat.
//  Config stored per-store: { botToken, chatId, enabled }
// ═══════════════════════════════════════════════════════════════
/**
 * Escapes HTML special characters for use in Telegram HTML-mode messages.
 * Prevents HTML injection through user-controlled fields (storeName, players, notes).
 * Telegram HTML supports only: <b>, <i>, <code>, <pre>, <a> — everything else is literal.
 */
function escHtml(str) {
  if (!str && str !== 0) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

var TelegramAPI = {
  _cfgKey: function(storeId) { return "eftgcfg" + storeId; },

  getConfig: function(storeId) {
    return dbGet(TelegramAPI._cfgKey(storeId)).then(function(r) {
      if (!r) return { enabled: false };
      // Strip any legacy botToken/chatId that may exist from old installations.
      // Tokens must never live in the browser.
      return { enabled: !!r.enabled };
    });
  },

  saveConfig: function(storeId, cfg) {
    // Only the "enabled" boolean is stored client-side.
    // The bot token and chat ID are NEVER stored in the browser.
    var sanitised = { enabled: !!cfg.enabled };
    return dbSet(TelegramAPI._cfgKey(storeId), sanitised);
  },

  /**
   * Sends a Telegram notification via the backend proxy.
   * The bot token NEVER leaves the server — this call sends
   * only the event type and payload (no credentials).
   *
   * eventType: "whatsapp_click" | "waitlist" | "sale" | "account_request"
   * payload:   event-specific data object
   */
  _notify: function(eventType, payload) {
    var controller = new AbortController();
    var tId = setTimeout(function() { controller.abort(); }, 10000);
    return fetch("/api/notify", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      signal:  controller.signal,
      body:    JSON.stringify({ eventType: eventType, payload: payload }),
    }).then(function(res) {
      clearTimeout(tId);
      return res.ok;
    }).catch(function(e) {
      clearTimeout(tId);
      if (e && e.name !== "AbortError") console.error("[TG proxy]", e);
      return false;
    });
  },

  /**
   * Legacy send() — kept as a no-op stub so any remaining call
   * sites that pass botToken/chatId directly don't crash.
   * All real sending now goes through _notify() → backend.
   */
  send: function(_botToken, _chatId, _text) {
    // Bot token must NEVER be sent from the client.
    // Use TelegramAPI._notify(eventType, payload) instead.
    console.warn("[TG] Direct send() called — use _notify() via backend proxy");
    return Promise.resolve(false);
  },

  /**
   * Sends a notification for a WhatsApp button click.
   */
  notifyWhatsappClick: function(storeId, accInfo) {
    return TelegramAPI.getConfig(storeId).then(function(cfg) {
      if (!cfg.enabled) return false;
      return TelegramAPI._notify("whatsapp_click", {
        storeName: accInfo.storeName || "",
        price:     String(accInfo.price || ""),
        players:   accInfo.players   || "",
      });
    }).catch(function(e) {
      console.error("[TG whatsapp notify]", e);
      return false;
    });
  },

  /**
   * Sends a notification when a buyer joins the waitlist.
   */
  notifyWaitlist: function(storeId, entry, storeName) {
    return TelegramAPI.getConfig(storeId).then(function(cfg) {
      if (!cfg.enabled) return false;
      return TelegramAPI._notify("waitlist", {
        storeName: storeName      || "",
        name:      entry.name     || "",
        whatsapp:  entry.whatsapp || "",
        note:      entry.note     || "",
      });
    }).catch(function(e) {
      console.error("[TG waitlist notify]", e);
      return false;
    });
  },

  /**
   * Sends a sale notification.
   */
  notifySale: function(storeId, acc, storeName) {
    return TelegramAPI.getConfig(storeId).then(function(cfg) {
      if (!cfg.enabled) return false;
      return TelegramAPI._notify("sale", {
        storeName: storeName || "",
        price:     String(calcTotalPrice ? calcTotalPrice(acc) : (acc.price || 0)),
        profit:    String(calcProfit ? calcProfit(acc) : 0),
        players:   acc.players || "",
      });
    }).catch(function(e) {
      console.error("[TG sale notify]", e);
      return false;
    });
  },

  /**
   * Sends notification when a buyer submits an account request.
   */
  notifyAccountRequest: function(storeId, req) {
    return TelegramAPI.getConfig(storeId).then(function(cfg) {
      if (!cfg.enabled) return false;
      return TelegramAPI._notify("account_request", {
        name:      req.name     || "",
        whatsapp:  req.whatsapp || "",
        players:   req.players  || "",
        minPrice:  req.minPrice || 0,
        maxPrice:  req.maxPrice || 0,
        minGp:     req.minGp    || "",
        note:      req.note     || "",
      });
    }).catch(function(e) {
      console.error("[TG account_request notify]", e);
      return false;
    });
  },

  /**
   * Test the connection with current config.
   */
  test: function(_botToken, _chatId) {
    // Test is now handled by the backend — no token sent from client.
    return fetch("/api/tg-test", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    "{}",
    }).then(function(r) { return r.json(); })
      .then(function(j) { return !!j.ok; })
      .catch(function(e) { console.error("[TG test]", e); return false; });
  },
};

// ═══════════════════════════════════════════════════════════════
//  STORE REGISTRY  (useSyncExternalStore — cross-tab sync)
// ═══════════════════════════════════════════════════════════════
function createStore(key, defaultValue) {
  var listeners = [];
  var snapshot = MEM[key] != null ? MEM[key] : defaultValue;

  function onStorage(e) {
    if (e.key !== key || e.newValue === null) return;
    try {
      snapshot = JSON.parse(e.newValue);
      MEM[key] = snapshot;
      listeners.forEach(function(l) { l(); });
    } catch(e2) {}
  }
  window.addEventListener("storage", onStorage);

  dbGet(key).then(function(v) {
    if (v !== null && JSON.stringify(v) !== JSON.stringify(snapshot)) {
      snapshot = v;
      listeners.forEach(function(l) { l(); });
    }
  });

  return {
    subscribe: function(listener) {
      listeners.push(listener);
      return function() {
        listeners = listeners.filter(function(l) { return l !== listener; });
      };
    },
    getSnapshot: function() { return snapshot; },
    getServerSnapshot: function() { return defaultValue; },
    // Releases the window.storage listener — call when the store is no longer needed.
    destroy: function() {
      window.removeEventListener("storage", onStorage);
      listeners = [];
    },
    set: function(updater) {
      var next = typeof updater === "function" ? updater(snapshot) : updater;
      snapshot = next;
      MEM[key] = next;
      // Invalidate search corpus cache when account data changes
      if (key.indexOf("efacc") === 0) { _searchCache = {}; }
      listeners.forEach(function(l) { l(); });
      dbSet(key, next);
    },
  };
}

var _storeCache = {};
function getStore(key, defaultValue) {
  if (!_storeCache[key]) {
    // Evict the entire cache if it grows beyond 50 unique keys.
    // This guards against memory accumulation in long-lived SPA sessions.
    var cacheKeys = Object.keys(_storeCache);
    if (cacheKeys.length >= 50) {
      cacheKeys.forEach(function(k) {
        if (_storeCache[k] && _storeCache[k].destroy) _storeCache[k].destroy();
      });
      _storeCache = {};
    }
    _storeCache[key] = createStore(key, defaultValue);
  }
  return _storeCache[key];
}

// ═══════════════════════════════════════════════════════════════
//  EXPIRY HELPERS
// ═══════════════════════════════════════════════════════════════
function isExpired(ms) { return ms !== null && ms <= Date.now(); }

function timeLabel(ms) {
  if (ms === null) return { text:"دائم", sub:"♾️", cls:"ok", urgent:false, done:false };
  var left = ms - Date.now();
  if (left <= 0) return { text:"منتهي", sub:"❌", cls:"dead", urgent:true, done:true };
  var sec = Math.ceil(left / 1000);
  var m = Math.floor(sec / 60);
  var h = Math.floor(m / 60);
  var d = Math.floor(h / 24);
  if (d >= 2) return { text: d + " يوم", sub:"✅", cls: d <= 7 ? "warn" : "ok", urgent:false, done:false };
  if (h >= 1) return { text: h + "س " + (m % 60) + "د", sub:"⏳", cls:"warn", urgent: h < 3, done:false };
  if (m >= 1) return { text: m + ":" + String(sec % 60).padStart(2, "0"), sub:"⚠️", cls:"dead", urgent:true, done:false };
  return { text: sec + " ثانية", sub:"🔴", cls:"dead", urgent:true, done:false };
}

function computeExpiry(type, val) {
  if (type === "permanent") return null;
  var d = new Date();
  var n = Math.max(1, parseInt(val) || 1);
  if (type === "hours")  { d.setHours(d.getHours() + n); return d.getTime(); }
  if (type === "days")   { d.setDate(d.getDate() + n);  return d.getTime(); }
  if (type === "week")   { d.setDate(d.getDate() + 7);  return d.getTime(); }
  if (type === "month")  { d.setDate(d.getDate() + 30); return d.getTime(); }
  if (type === "3month") { d.setDate(d.getDate() + 90); return d.getTime(); }
  // Unknown type — fall back to permanent (null) to avoid silent miscalculation
  console.warn("[computeExpiry] unknown type:", type);
  return null;
}

// ═══════════════════════════════════════════════════════════════
//  INTL FORMATTERS
// ═══════════════════════════════════════════════════════════════
var FMT_PRICE = new Intl.NumberFormat("ar-EG");
var FMT_DATE  = new Intl.DateTimeFormat("ar-EG", { dateStyle:"short" });
var FMT_DT    = new Intl.DateTimeFormat("ar-EG", { dateStyle:"short", timeStyle:"short" });
var FMT_RTF   = new Intl.RelativeTimeFormat("ar-EG", { numeric:"auto" });

function relativeTime(ts) {
  // Guard: return empty string for invalid/missing timestamps
  if (!ts || isNaN(ts)) return "";
  var diff = (ts - Date.now()) / 1000;
  var abs  = Math.abs(diff);
  if (abs < 60)      return FMT_RTF.format(Math.round(diff), "second");
  if (abs < 3600)    return FMT_RTF.format(Math.round(diff / 60), "minute");
  if (abs < 86400)   return FMT_RTF.format(Math.round(diff / 3600), "hour");
  if (abs < 2592000) return FMT_RTF.format(Math.round(diff / 86400), "day");
  return FMT_RTF.format(Math.round(diff / 2592000), "month");
}

// السعر الإجمالي = سعر صاحب الحساب + العمولة
function calcTotalPrice(acc) {
  var b = +acc.basePrice  || 0;
  var c = +acc.commission || 0;
  return b + c;
}

// المكسب الصافي = العمولة فقط
function calcProfit(acc) {

}

];

/**
 * Strips HTML tags and null bytes from any text value.
 * Prevents stored XSS and database injection via freeform fields.
 */
function sanitizeText(str) {
  if (str === null || str === undefined) return "";
  // Do NOT HTML-encode < and > here: React text nodes auto-escape, so
  // pre-encoding causes visible &lt; / &gt; in the UI.
  // HTML-context escaping for exportPDF and Telegram uses _esc() / escHtml().
  return String(str)
    .replace(/\x00/g, "")    // strip null bytes
    .replace(/[\u200B-\u200F\u202A-\u202E\u2060-\u2064\uFEFF]/g, "")
    .slice(0, 2000);
}


function sanitizePhone(str) {
  // Strip everything except digits and leading +
  var raw = (str || "").replace(/[^0-9+]/g, "");
  raw = raw.replace(/^\+/, "");
  return raw.slice(0, 15);
}

/**
 * Converts a local/international phone number to a wa.me-compatible
 * E.164 number (digits only, no +, with country code).
 *
 * Rules applied in order:
 *  1. Already starts with a valid country code ≥ 2 digits and length ≥ 10 → keep
 *  2. Starts with 0 and is 10–11 digits (Egyptian/Arab local) → strip leading 0,
 *     prepend 20 (Egypt). Works for 01x xxxxxxxx patterns.
 *  3. Otherwise → return as-is and let isSafePhone decide.
 */
function normaliseWaNumber(raw) {
  if (!raw) return "";
  var digits = raw.replace(/[^0-9]/g, "");

  // Already has country code: starts with 1,2,3,4,5,6,7,9 and ≥ 10 digits
  // (Most country codes start with these; 0 is never a valid CC start)
  if (digits.length >= 10 && digits[0] !== "0") return digits;

  // Leading zero — assume Egyptian local number (01x xxxxxxxx = 11 digits)
  if (digits[0] === "0" && digits.length >= 10) {
    return "20" + digits.slice(1); // strip 0, prepend Egypt code 20
  }

  return digits;
}

function isSafePhone(wa) {
  var normalised = normaliseWaNumber(wa);
  // Must be 7–15 digits after normalisation
  return /^[0-9]{7,15}$/.test(normalised);
}

function exportCSV(accs, storeName) {
  var esc = function(v) { return '"' + String(v || "").replace(/"/g, '""') + '"'; };
  var header = ["سعر صاحب الحساب","عمولتك","سعر العميل","اللاعبين","الرصيد","واتساب","ملاحظات","الحالة","التاريخ"].join(",");
  var rows = accs.map(function(a) {
    return [esc(+a.basePrice||0), esc(+a.commission||0), esc(calcTotalPrice(a)),
            esc(a.players), esc(a.gp), esc(a.whatsapp),
            esc(a.notes), a.sold ? "مباع" : "متاح",
            FMT_DATE.format(new Date(a.createdAt))].join(",");
  });
  var blob = new Blob(["\ufeff" + [header].concat(rows).join("\n")], { type:"text/csv;charset=utf-8" });
  var url = URL.createObjectURL(blob);
  var link = document.createElement("a");
  link.href = url;
  link.download = storeName.replace(/[/\\:*?"<>|]/g, "-") + "_" + new Date().toISOString().slice(0, 10) + ".csv";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════════════════
//  AD CARD GENERATOR  (Canvas API)
//  Generates a 1080×1080 promotional image for a single account.
//  Returns Promise<string> — PNG data URL ready for download.
// ═══════════════════════════════════════════════════════════════
var AdCardAPI = {
  generate: function(acc, storeName, accountImage) {
    return new Promise(function(resolve, reject) {
      try {
        var W = 1080, H = 1080;
        var canvas = document.createElement("canvas");
        canvas.width  = W;
        canvas.height = H;
        var ctx = canvas.getContext("2d");
        if (!ctx) { reject(new Error("Canvas not supported")); return; }

        function drawCard(bgImage) {
          try {
            // ── Background ──────────────────────────────────────
            if (bgImage) {
              // Blur + darken the account image as background
              ctx.filter = "blur(8px) brightness(0.35)";
              var scale  = Math.max(W / bgImage.naturalWidth, H / bgImage.naturalHeight);
              var bw = bgImage.naturalWidth  * scale;
              var bh = bgImage.naturalHeight * scale;
              ctx.drawImage(bgImage, (W - bw) / 2, (H - bh) / 2, bw, bh);
              ctx.filter = "none";
            } else {
              // Dark gradient background
              var grad = ctx.createLinearGradient(0, 0, W, H);
              grad.addColorStop(0,   "#020a16");
              grad.addColorStop(0.5, "#0e1d30");
              grad.addColorStop(1,   "#020a16");
              ctx.fillStyle = grad;
              ctx.fillRect(0, 0, W, H);
            }

            // ── Grid overlay ─────────────────────────────────────
            ctx.strokeStyle = "rgba(255,255,255,0.04)";
            ctx.lineWidth   = 1;
            for (var gx = 0; gx < W; gx += 64) {
              ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
            }
            for (var gy = 0; gy < H; gy += 64) {
              ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
            }

            // ── Green glow top ────────────────────────────────────
            var radGrad = ctx.createRadialGradient(W/2, 0, 0, W/2, 0, 600);
            radGrad.addColorStop(0,   "rgba(0,224,110,0.18)");
            radGrad.addColorStop(1,   "rgba(0,224,110,0)");
            ctx.fillStyle = radGrad;
            ctx.fillRect(0, 0, W, H);

            // ── Store name pill ───────────────────────────────────
            var storeText = "⚽  " + storeName;
            ctx.font      = "bold 34px Cairo, Arial, sans-serif";
            var storeW    = ctx.measureText(storeText).width;
            var pillX     = W / 2 - storeW / 2 - 24;
            var pillY     = 54;
            var pillH     = 58;
            var pillW     = storeW + 48;
            ctx.fillStyle   = "rgba(0,224,110,0.15)";
            ctx.strokeStyle = "rgba(0,224,110,0.5)";
            ctx.lineWidth   = 1.5;
            AdCardAPI._roundRect(ctx, pillX, pillY, pillW, pillH, 29);
            ctx.fill(); ctx.stroke();
            ctx.fillStyle  = "#00e06e";
            ctx.textAlign  = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(storeText, W / 2, pillY + pillH / 2);

            // ── Price badge ───────────────────────────────────────
            var price = (calcTotalPrice ? calcTotalPrice(acc) : (+acc.price || 0));
            var priceText = price.toLocaleString("ar-EG") + " ج";
            ctx.font      = "900 110px Cairo, Arial, sans-serif";
            var priceMid  = H / 2 - 30;
            // Shadow
            ctx.shadowColor   = "rgba(0,224,110,0.6)";
            ctx.shadowBlur    = 48;
            ctx.fillStyle     = "#ffffff";
            ctx.fillText(priceText, W / 2, priceMid);
            ctx.shadowBlur    = 0;

            // ── Label under price ─────────────────────────────────
            ctx.font      = "600 32px Cairo, Arial, sans-serif";
            ctx.fillStyle = "rgba(255,255,255,0.5)";
            ctx.fillText("السعر الإجمالي", W / 2, priceMid + 75);

            // ── Divider ───────────────────────────────────────────
            var divY = priceMid + 120;
            var divGrad = ctx.createLinearGradient(80, 0, W - 80, 0);
            divGrad.addColorStop(0,   "transparent");
            divGrad.addColorStop(0.5, "rgba(0,224,110,0.4)");
            divGrad.addColorStop(1,   "transparent");
            ctx.strokeStyle = divGrad;
            ctx.lineWidth   = 1;
            ctx.beginPath();
            ctx.moveTo(80, divY); ctx.lineTo(W - 80, divY);
            ctx.stroke();

            // ── Players ───────────────────────────────────────────
            if (acc.players) {
              ctx.font      = "bold 38px Cairo, Arial, sans-serif";
              ctx.fillStyle = "#eef2ff";
              var playersText = "⭐  " + (acc.players.length > 55 ? acc.players.slice(0, 55) + "…" : acc.players);
              ctx.fillText(playersText, W / 2, divY + 64);
            }

            // ── GP / Balance ──────────────────────────────────────
            if (acc.gp) {
              ctx.font      = "500 32px Cairo, Arial, sans-serif";
              ctx.fillStyle = "rgba(255,255,255,0.6)";
              ctx.fillText("💰  " + acc.gp, W / 2, divY + (acc.players ? 130 : 64));
            }

            // ── WhatsApp CTA bar ──────────────────────────────────
            var ctaY = H - 180;
            ctx.fillStyle = "rgba(37,211,102,0.12)";
            ctx.strokeStyle = "rgba(37,211,102,0.35)";
            ctx.lineWidth   = 1.5;
            AdCardAPI._roundRect(ctx, 80, ctaY, W - 160, 96, 20);
            ctx.fill(); ctx.stroke();
            ctx.font      = "bold 36px Cairo, Arial, sans-serif";
            ctx.fillStyle = "#25d366";
            ctx.fillText("💬  تواصل معنا على واتساب", W / 2, ctaY + 48);

            // ── Footer watermark ──────────────────────────────────
            ctx.font      = "500 22px Cairo, Arial, sans-serif";
            ctx.fillStyle = "rgba(255,255,255,0.18)";
            ctx.fillText("eFootball Store  ·  " + storeName, W / 2, H - 40);

            var result = canvas.toDataURL("image/png", 0.95);
            canvas.width = 0; canvas.height = 0;
            resolve(result);
          } catch(e) {
            console.error("[AdCard drawCard]", e);
            reject(e);
          }
        }

        if (accountImage) {
          var img   = new Image();
          img.onload  = function() { drawCard(img); };
          img.onerror = function() { drawCard(null); };
          img.src = accountImage;
        } else {
          drawCard(null);
        }
      } catch(e) {
        console.error("[AdCard generate]", e);
        reject(e);
      }
    });
  },

  _roundRect: function(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y,     x + w, y + r,     r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x,     y + h, x,     y + h - r, r);
    ctx.lineTo(x,     y + r);
    ctx.arcTo(x,     y,     x + r, y,          r);
    ctx.closePath();
  },

  download: function(dataUrl, filename) {
    try {
      var a  = document.createElement("a");
      a.href = dataUrl;
      a.download = (filename || "account-ad") + ".png";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    } catch(e) {
      console.error("[AdCard download]", e);
    }
  },
};

// ═══════════════════════════════════════════════════════════════
//  PLAYER NAME UTILITIES  (module-level — used by search + analytics)
// ═══════════════════════════════════════════════════════════════

/**
 * Split a players field string into individual player names.
 * Handles all common delimiters while preserving multi-word names.
 */
function extractPlayerNames(str) {
  if (!str) return [];
  var s = str.replace(/[ً-ٰٟ]/g, ""); // strip diacritics
  var raw = s.split(/[،,\n\/|+]|\s+-\s+/);
  var out = [];
  for (var ri = 0; ri < raw.length; ri++) {
    var nm = raw[ri]
      .replace(/^\s+|\s+$/g, "")
      .replace(/^[^؀-ۿa-zA-Z0-9]+|[^؀-ۿa-zA-Z0-9]+$/g, "")
      .replace(/\s+/g, " ")
      .trim();
    if (nm.length >= 2 && !/^[0-9]+$/.test(nm)) out.push(nm);
  }
  return out;
}

// ═══════════════════════════════════════════════════════════════
//  PRECISION SEARCH ENGINE
//  Multi-field, multi-token, Arabic-aware search.
//  Strategy (in order of precision):
//    1. Exact substring match on any field  → score 1.0
//    2. Every query token found as substring → score 0.9
//    3. Every query token starts a word     → score 0.75
//    4. Every query token prefix-matches    → score 0.6
//    5. Fuzzy char-sequence match           → score 0.0–0.5
//  A result is included only when score ≥ SEARCH_THRESHOLD.
// ═══════════════════════════════════════════════════════════════
var SEARCH_THRESHOLD = 0.55;

// Normalise: lowercase, collapse spaces, strip diacritics
function normaliseText(str) {
  if (!str) return "";
  return str
    .toLowerCase()
    .replace(/[ً-ٰٟ]/g, "")   // strip Arabic diacritics
    .replace(/آ|أ|إ/g, "ا") // normalise Alef forms → ا
    .replace(/ة/g, "ه")               // ة → ه
    .replace(/ى/g, "ي")               // ى → ي
    .replace(/\s+/g, " ")
    .trim();
}

// Tokenise a query string into meaningful tokens (≥ 1 char)
function tokenise(q) {
  return normaliseText(q)
    .split(/[\s،,\/\-_]+/)
    .filter(function(t) { return t.length >= 1; });
}

// True if every token appears as a substring anywhere in text
function allTokensSubstring(text, tokens) {
  return tokens.every(function(tok) { return text.indexOf(tok) !== -1; });
}

// True if every token is a prefix of at least one word in text
function allTokensWordPrefix(textWords, tokens) {
  return tokens.every(function(tok) {
    return textWords.some(function(w) { return w.indexOf(tok) === 0; });
  });
}

// Classic fuzzy char-sequence score (0–1)
function charSeqScore(text, query) {
  var qi = 0, score = 0, lastIdx = -1;
  for (var ti = 0; ti < text.length && qi < query.length; ti++) {
    if (text[ti] === query[qi]) {
      score += lastIdx >= 0 ? 1 / (1 + (ti - lastIdx - 1) * 0.4) : 1;
      lastIdx = ti;
      qi++;
    }
  }
  if (qi < query.length) return 0;
  return Math.min(score / query.length, 1);
}

/**
 * Main search function.
 * Returns a score 0–1; anything below SEARCH_THRESHOLD is excluded.
 * acc   — account object with all fields
 * query — raw query string typed by the user
 *
 * Performance: per-account corpus is cached in _searchCache by account id+price
 * to avoid redundant normalisation on every keystroke.
 */
var _searchCache = {};

function _buildCorpus(acc) {
  // Include basePrice+commission in key so price edits correctly invalidate the corpus.
  // acc.price is a legacy alias for basePrice+commission — use both for safety.
  var cacheKey = acc.id + "|" + (acc.basePrice || acc.price || "") + "|" + (acc.commission || "") + "|" + (acc.players || "");
  if (_searchCache[cacheKey]) return _searchCache[cacheKey];
  var price       = normaliseText(String(calcTotalPrice(acc)));
  var base        = normaliseText(String(+acc.basePrice  || 0));
  var comm        = normaliseText(String(+acc.commission || 0));
  var gp          = normaliseText(acc.gp       || "");
  var notes       = normaliseText(acc.notes    || "");
  var wa          = normaliseText(acc.whatsapp || "");
  var playerNames = extractPlayerNames(acc.players || "").map(normaliseText);
  var players     = playerNames.join(" ");
  var corpus      = [price, players, gp, notes, wa, base, comm].join(" ");
  var result = { price:price, base:base, comm:comm, gp:gp, notes:notes,
                 wa:wa, playerNames:playerNames, players:players, corpus:corpus };
  // Evict oldest 10% of entries when cache exceeds 2000 to prevent unbounded growth.
  var keys = Object.keys(_searchCache);
  if (keys.length > 2000) {
    var evictCount = Math.ceil(keys.length * 0.1);
    for (var ei = 0; ei < evictCount; ei++) { delete _searchCache[keys[ei]]; }
  }
  _searchCache[cacheKey] = result;
  return result;
}

function searchAccount(acc, query) {
  if (!query || !query.trim()) return 1;
  var c = _buildCorpus(acc);
  var price = c.price; var base = c.base; var comm = c.comm;
  var gp = c.gp; var notes = c.notes; var wa = c.wa;
  var playerNames = c.playerNames; var players = c.players;

  // Combined corpus for substring searches
  var corpus = c.corpus;

  var nq     = normaliseText(query);
  var tokens = tokenise(query);
  var words  = corpus.split(/\s+/);

  // Level 1 — exact full-query substring anywhere
  if (corpus.indexOf(nq) !== -1) return 1.0;

  // Level 2 — all tokens found as substrings anywhere in corpus
  if (tokens.length > 0 && allTokensSubstring(corpus, tokens)) return 0.9;

  // Level 2b — query matches the start or full name of any individual player
  //             e.g. typing "مبابي" should score high against "كيليان مبابي"
  var nqNorm = normaliseText(nq);
  var playerMatch = playerNames.some(function(pn) {
    return pn === nqNorm || pn.indexOf(nqNorm) !== -1 || nqNorm.indexOf(pn) !== -1;
  });
  if (playerMatch) return 0.92;

  // Level 3 — all tokens word-prefix match
  if (tokens.length > 0 && allTokensWordPrefix(words, tokens)) return 0.75;

  // Level 4 — each token is a substring of at least one field individually
  //           (stricter than corpus-wide — avoids cross-field false positives)
  var fields = [players, gp, notes, price, wa];
  var allPrefixInField = tokens.every(function(tok) {
    return fields.some(function(f) { return f.indexOf(tok) !== -1; });
  });
  if (tokens.length > 0 && allPrefixInField) return 0.6;

  // Level 5 — fuzzy char-sequence on the most relevant field (players)
  var fuzzy = charSeqScore(players, nq);
  if (fuzzy >= 0.65) return fuzzy * 0.5; // cap at 0.5 — below threshold unless strong

  return 0;
}

// ═══════════════════════════════════════════════════════════════
//  TOAST CONTEXT
// ═══════════════════════════════════════════════════════════════
var ToastContext = createContext(null);

function ToastProvider(props) {
  var _t = useState([]);
  var toasts = _t[0], setToasts = _t[1];
  var idRef    = useRef(0);
  var timersRef = useRef({});

  useEffect(function() {
    return function() {
      var timers = timersRef.current;
      Object.keys(timers).forEach(function(k) { clearTimeout(timers[k]); });
    };
  }, []);

  // push(msg, type, actionId?, actionFn?)
  // type can be: "success" | "error" | "warn" | "warn_undo"
  var push = useCallback(function(msg, type, actionId, actionFn) {
    if (!type) type = "success";
    var id = ++idRef.current;
    var toast = { id: id, msg: msg, type: type, actionFn: actionFn || null };
    setToasts(function(t) { return t.concat([toast]); });
    var delay = type === "warn_undo" ? 5000 : 2800;
    var tid = setTimeout(function() {
      setToasts(function(t) { return t.filter(function(x) { return x.id !== id; }); });
      delete timersRef.current[id];
    }, delay);
    timersRef.current[id] = tid;
  }, []);

  var dismiss = useCallback(function(id) {
    clearTimeout(timersRef.current[id]);
    delete timersRef.current[id];
    setToasts(function(t) { return t.filter(function(x) { return x.id !== id; }); });
  }, []);

  var ToastUI = useMemo(function() {
    return (
      <div className="toast-wrap" role="status" aria-live="polite" aria-atomic="true">
        {toasts.map(function(t) {
          var icon = t.type === "success" ? "✅" : t.type === "error" ? "❌" : "⚠️";
