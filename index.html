    return Promise.all([encToken(storeId, newExp, false), encToken(storeId, newExp, true)])
      .then(function(codes) {
        var upd = {
          viewCode:  codes[0],
          adminCode: codes[1],
          expiryMs:  newExp,
          createdAt: new Date().toISOString(),
        };
        store.set(function(prev) {
          return prev.map(function(h) {
            return h.storeId === storeId ? Object.assign({}, h, upd) : h;
          });
        });
        push("تم التجديد — الأكواد الجديدة جاهزة", "success");
      });
  }, [store, push]);

  var removeHist = useCallback(function(storeId) {
    store.set(function(prev) { return prev.filter(function(h) { return h.storeId !== storeId; }); });
    push("تم حذف الستور من السجل", "warn");
  }, [store, push]);

  var copyAll = useCallback(function() {
    var current = store.getSnapshot();
    var txt = current.map(function(h) {
      return "🏪 " + h.storeName + "\n   👁️ مشتري: " + h.viewCode + "\n   🔑 بائع: " + h.adminCode;
    }).join("\n\n");
    if (!navigator.clipboard || !window.isSecureContext) {
      push("فشل النسخ — تحقق من الصلاحيات", "error");
      return;
    }
    navigator.clipboard.writeText(txt)
      .then(function() { push("تم نسخ جميع الأكواد", "success"); })
      .catch(function() { push("فشل النسخ — تحقق من الصلاحيات", "error"); });
  }, [store, push]);

  var derived = useMemo(function() {
    var active = hist.reduce(function(n, h) { return n + (isExpired(h.expiryMs) ? 0 : 1); }, 0);
    var activeStores = hist.filter(function(h) { return !isExpired(h.expiryMs); }).sort(function(a, b) {
      if (a.expiryMs === null && b.expiryMs === null) return 0;
      if (a.expiryMs === null) return 1;
      if (b.expiryMs === null) return -1;
      return a.expiryMs - b.expiryMs;
    });
    return { active:active, activeStores:activeStores };
  }, [hist]);

  return {
    hist:hist, loading:loading,
    active:derived.active, activeStores:derived.activeStores,
    create:create, renew:renew, remove:removeHist, copyAll:copyAll,
  };
}

// ─── useAccForm ────────────────────────────────────────────────
function useAccForm(initial) {
  var defaults = { basePrice:"", commission:"", players:"", gp:"", whatsapp:"", notes:"" };
  // backward-compat: if existing account has old "price" field, split it
  var initVal = initial ? Object.assign({}, initial) : defaults;
  if (initVal.price && !initVal.basePrice) {
    initVal.basePrice  = initVal.price;
    initVal.commission = "0";
  }
  var _f = useState(initVal);
  var f = _f[0], setF = _f[1];
  var _e = useState("");
  var err = _e[0], setErr = _e[1];

  var set = useCallback(function(k, v) {
    // Sanitize freeform text fields; numeric/phone fields handled by their own validators
    var clean = (k === "price" || k === "basePrice" || k === "commission")
      ? v  // numeric — leave as-is, validated at submit
      : k === "whatsapp"
        ? v  // phone — sanitized by sanitizePhone at render
        : sanitizeText(v);
    setF(function(x) { return Object.assign({}, x, { [k]: clean }); });
  }, []);

  var totalPrice = (+f.basePrice || 0) + (+f.commission || 0);

  var validate = useCallback(function() {
    if (!f.basePrice || +f.basePrice <= 0)                     { setErr("أدخل سعر صاحب الحساب — يجب أن يكون أكبر من الصفر"); return false; }
    if (+f.commission < 0)                                     { setErr("العمولة لا يمكن أن تكون سالبة"); return false; }
    if ((f.whatsapp || "").replace(/[^0-9]/g, "").length < 10) { setErr("رقم الواتساب يجب أن يكون 10 أرقام على الأقل"); return false; }
    setErr(""); return true;
  }, [f.basePrice, f.commission, f.whatsapp]);

  return { f:f, err:err, set:set, validate:validate, totalPrice:totalPrice };
}

/**
 * Normalises a player name for deduplication:
 * strips diacritics, normalises Alef variants, lowercases.
 * Defined at module scope so it is not recreated inside useMemo.
 */
function normPlayerKey(name) {
  return name
    .replace(/[ً-ٰٟ]/g, "")
    .replace(/آ|أ|إ/g, "ا")
    .replace(/ة/g, "ه")
    .replace(/ى/g, "ي")
    .toLowerCase()
    .trim();
}

// ─── useAnalytics ──────────────────────────────────────────────
function useAnalytics(accs) {
  return useMemo(function() {
    var sold = accs.filter(function(a) { return a.sold; });
    var DAY  = 86400000;
    var WEEK = 7 * DAY;
    var now  = Date.now();

    var dailyRevenue = [];
    for (var di = 0; di < 14; di++) {
      var dayStart = now - (13 - di) * DAY;
      var dayEnd   = dayStart + DAY;
      var items    = sold.filter(function(a) {
        // Use soldAt for accuracy; fall back to createdAt for accounts added before soldAt was introduced.
        var ts = a.soldAt || a.createdAt;
        return ts >= dayStart && ts < dayEnd;
      });
      dailyRevenue.push({
        label:   FMT_DATE.format(new Date(dayStart)).slice(0, 5),
        revenue: items.reduce(function(s, a) { return s + calcTotalPrice(a); }, 0),
        profit:  items.reduce(function(s, a) { return s + calcProfit(a); }, 0),
        count:   items.length,
        date:    dayStart,
      });
    }

    var weeklyRevenue = [];
    for (var wi = 0; wi < 8; wi++) {
      var wStart = now - (7 - wi) * WEEK;
      var wEnd   = wStart + WEEK;
      var wItems = sold.filter(function(a) {
        var ts = a.soldAt || a.createdAt;
        return ts >= wStart && ts < wEnd;
      });
      weeklyRevenue.push({
        label:   "أ" + (wi + 1),
        revenue: wItems.reduce(function(s, a) { return s + calcTotalPrice(a); }, 0),
        profit:  wItems.reduce(function(s, a) { return s + calcProfit(a); }, 0),
        count:   wItems.length,
        date:    wStart,
      });
    }

    var thisWeek       = weeklyRevenue[6] ? weeklyRevenue[6].revenue : 0;
    var lastWeek       = weeklyRevenue[5] ? weeklyRevenue[5].revenue : 0;
    var thisWeekProfit = weeklyRevenue[6] ? weeklyRevenue[6].profit  : 0;
    var lastWeekProfit = weeklyRevenue[5] ? weeklyRevenue[5].profit  : 0;
    var growth         = lastWeek === 0 ? (thisWeek > 0 ? 100 : 0) : Math.round(((thisWeek - lastWeek) / lastWeek) * 100);
    var profitGrowth   = lastWeekProfit === 0 ? (thisWeekProfit > 0 ? 100 : 0) : Math.round(((thisWeekProfit - lastWeekProfit) / lastWeekProfit) * 100);

    // normPlayerKey is defined at module scope (below useAnalytics)
    // to avoid redefinition on every useMemo invocation.

    var freq = {};        // key → normalised name
    var freqDisplay = {}; // key → best display name (first seen)
    sold.forEach(function(a) {
      if (!a.players) return;
      extractPlayerNames(a.players).forEach(function(nm) {
        var key = normPlayerKey(nm);
        if (!key || key.length < 2) return;
        freq[key]        = (freq[key] || 0) + 1;
        // Keep the first (longest) display form encountered
        if (!freqDisplay[key] || nm.length > freqDisplay[key].length) {
          freqDisplay[key] = nm;
        }
      });
    });
    var maxFreq = Math.max.apply(null, [1].concat(Object.keys(freq).map(function(k) { return freq[k]; })));
    var topPlayers = Object.keys(freq).map(function(key) {
      return { name: freqDisplay[key], count: freq[key], pct: Math.round(freq[key] / maxFreq * 100) };
    }).sort(function(a, b) { return b.count - a.count; }).slice(0, 10);

    var totalRevenue = sold.reduce(function(s, a) { return s + calcTotalPrice(a); }, 0);
    var totalProfit  = sold.reduce(function(s, a) { return s + calcProfit(a); }, 0);
    var avgPrice     = sold.length ? Math.round(totalRevenue / sold.length) : 0;
    var avgProfit    = sold.length ? Math.round(totalProfit  / sold.length) : 0;

    return {
      dailyRevenue:dailyRevenue, weeklyRevenue:weeklyRevenue,
      topPlayers:topPlayers, growth:growth, profitGrowth:profitGrowth,
      totalRevenue:totalRevenue, totalProfit:totalProfit,
      avgPrice:avgPrice, avgProfit:avgProfit,
      soldCount:sold.length,
      thisWeek:thisWeek, lastWeek:lastWeek,
      thisWeekProfit:thisWeekProfit, lastWeekProfit:lastWeekProfit,
    };
  }, [accs]);
}

// Network status banner — appears when offline, auto-dismisses when back online
function NetworkBanner() {
  var online = useNetworkStatus();
  var _prev  = useRef(true);
  var _show  = useState(null);
  var show = _show[0], setShow = _show[1];

  useEffect(function() {
    if (_prev.current && !online) {
      // Just went offline
      setShow("offline");
    } else if (!_prev.current && online) {
      // Just came back online
      setShow("online");
      var tid = setTimeout(function() { setShow(null); }, 3000);
      return function() { clearTimeout(tid); };
    }
    _prev.current = online;
  }, [online]);

  if (!show) return null;
  return (
    <div className={"network-banner" + (show === "online" ? " back" : "")}>
      {show === "offline" ? "📵 لا يوجد اتصال بالإنترنت — التخزين يعمل محلياً" : "✅ عاد الاتصال بالإنترنت"}
    </div>
  );
}

var CopyBtn = memo(function(props) {
  var text = props.text;
  var _s = useState("idle");
  var st = _s[0], setSt = _s[1];
  var tRef = useRef(null);
  useEffect(function() { return function() { clearTimeout(tRef.current); }; }, []);
  var copy = useCallback(function() {
    if (!navigator.clipboard || !window.isSecureContext) {
      setSt("fail");
      tRef.current = setTimeout(function() { setSt("idle"); }, 2200);
      return;
    }
    navigator.clipboard.writeText(text)
      .then(function() { setSt("done"); tRef.current = setTimeout(function() { setSt("idle"); }, 1800); })
      .catch(function() { setSt("fail"); tRef.current = setTimeout(function() { setSt("idle"); }, 2200); });
  }, [text]);
  return (
    <button type="button"
      className={"cp" + (st === "done" ? " done" : st === "fail" ? " fail" : "")}
      onClick={copy} aria-label="نسخ الكود">
      {st === "done" ? "✓ تم" : st === "fail" ? "✗ فشل" : "نسخ"}
    </button>
  );
});

var BarChart = memo(function(props) {
  var data = props.data, color = props.color || "#00e06e", label = props.label || "revenue";
  var W = 320, H = 120, PAD = 8, BAR_PAD = 3;
  var vals = data.map(function(d) { return d[label]; });
  var maxVal = Math.max.apply(null, [1].concat(vals));
  var bw = Math.floor((W - PAD * 2) / data.length) - BAR_PAD;

  return (
    <svg viewBox={"0 0 " + W + " " + (H + 24)} style={{width:"100%",overflow:"visible"}} aria-hidden="true">
      {[0.25, 0.5, 0.75, 1].map(function(f) {
        return (
          <line key={f} x1={PAD} x2={W - PAD}
            y1={H - (H - PAD) * f} y2={H - (H - PAD) * f}
            stroke="rgba(255,255,255,.05)" strokeWidth="1"/>
        );
      })}
      {data.map(function(d, i) {
        var x   = PAD + i * (bw + BAR_PAD);
        var pct = d[label] / maxVal;
        var bh  = Math.max(2, (H - PAD) * pct);
        var y   = H - bh;
        return (
          <g key={i}>
            <rect x={x} y={y} width={bw} height={bh} rx={3}
              fill={color} opacity=".85"/>
            {i % 3 === 0 && (
              <text x={x + bw / 2} y={H + 18} textAnchor="middle"
                fill="rgba(255,255,255,.35)" fontSize="9" fontFamily="Cairo,sans-serif">
                {d.label}
              </text>
            )}
            {d[label] > 0 && (
              <text x={x + bw / 2} y={y - 4} textAnchor="middle"
                fill={color} fontSize="8" fontFamily="Cairo,sans-serif" fontWeight="700">
                {d[label] >= 1000 ? Math.round(d[label] / 1000) + "k" : d[label]}
              </text>
            )}
          </g>
        );
      })}
    </svg>
  );
});

var LineChart = memo(function(props) {
  var data = props.data, color = props.color || "#00e06e", label = props.label || "revenue";
  var chartId = useId().replace(/:/g, ""); // unique per instance — prevents SVG gradient ID collision
  var W = 320, H = 100, PAD = 12;
  var vals = data.map(function(d) { return d[label]; });
  var maxVal = Math.max.apply(null, [1].concat(vals));
  var pts = data.map(function(d, i) {
    return {
      x: data.length < 2 ? W / 2 : PAD + (i / (data.length - 1)) * (W - PAD * 2),
      y: H - PAD - ((H - PAD * 2) * d[label] / maxVal),
      d: d,
    };
  });
  var pathD  = pts.map(function(p, i) { return (i === 0 ? "M" : "L") + p.x + "," + p.y; }).join(" ");
  var areaD  = pathD + " L" + pts[pts.length - 1].x + "," + H + " L" + pts[0].x + "," + H + " Z";

  return (
    <svg viewBox={"0 0 " + W + " " + H} style={{width:"100%",overflow:"visible"}} aria-hidden="true">
      <defs>
        <linearGradient id={"areaGrad-" + chartId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity=".22"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={areaD} fill={"url(#areaGrad-" + chartId + ")"}/>
      <path d={pathD} fill="none" stroke={color} strokeWidth="2"
        strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map(function(p, i) {
        return (
          <circle key={i} cx={p.x} cy={p.y} r="3.5"
            fill={T.c.bg} stroke={color} strokeWidth="2">
            <title>{p.d.label + ": " + FMT_PRICE.format(p.d[label]) + " ج (" + p.d.count + " حساب)"}</title>
          </circle>
        );
      })}
    </svg>
  );
});

            {loading ? (

                <p style={{color:T.c.t3,fontSize:T.fs.md,maxWidth:280,lineHeight:1.6}}>
                  {accs.length === 0

                  <button className="btn-p"
                    onClick={function() { openModal("add"); }}
                    style={{padding:T.sp.md + "px " + T.sp.xxl + "px",fontSize:T.fs.lg,marginTop:T.sp.sm}}>

              <React.Fragment>
                {!isAdmin && (
                  <BuyerRequestBanner

                <VirtualGrid items={filtered} isAdmin={isAdmin} selected={selected}
                bulkMode={bulkMode} onSelect={handleSelect}
                onEdit={handleEditById} onToggleSold={handleToggleSold} onDelete={handleDelete}
                isPending={fs.isPending}
                storeId={storeId} storeName={storeName}/>
              </React.Fragment>
            )}
            </div>{/* /store-panel-accounts */}
          </React.Fragment>

      </div>

      <button className={"scroll-top" + (scrollCtrl.show ? " vis" : "")}
        onClick={scrollCtrl.scrollToTop}
        aria-label="عودة للأعلى">
        ↑
      </button>

      {modal && (
        <AccModal key={modal === "add" ? "new" : modal.id}
          initial={modal === "add" ? null : modal}
          storeId={storeId}
          storeName={storeName}
          onSave={handleSave}
          onClose={function() { openModal(null); }}/>
      )}
      <ComparePanel/>
    </div>
    </CompareProvider>
  );
}

// ═══════════════════════════════════════════════════════════════
//  PLATFORM REVENUE DASHBOARD  (Super Admin only)
//  Shows the platform owner's own earnings from selling store
//  subscriptions — based on the configured pricing tiers.
// ═══════════════════════════════════════════════════════════════
function PlatformRevenueDashboard(props) {
  var hist = props.hist || [];

  var data = useMemo(function() {
    var DAY  = 86400000;
    var now  = Date.now();

    // Compute revenue per store entry
    var entries = hist.map(function(h) {
      var rev = calcPlatformRevenue(h);
      return Object.assign({}, h, {
        revenue:  rev.amount,
        durLabel: rev.label,
        createdTs: new Date(h.createdAt).getTime(),
      });
    });

    // KPIs
    var totalRev   = entries.reduce(function(s, e) { return s + e.revenue; }, 0);
    var activeRev  = entries
      .filter(function(e) { return !isExpired(e.expiryMs); })
      .reduce(function(s, e) { return s + e.revenue; }, 0);

    var thisMonth  = entries.filter(function(e) { return e.createdTs >= now - 30 * DAY; });
    var lastMonth  = entries.filter(function(e) {
      return e.createdTs >= now - 60 * DAY && e.createdTs < now - 30 * DAY;
    });
    var thisMonthRev = thisMonth.reduce(function(s, e) { return s + e.revenue; }, 0);
    var lastMonthRev = lastMonth.reduce(function(s, e) { return s + e.revenue; }, 0);
    var growth = lastMonthRev === 0
      ? (thisMonthRev > 0 ? 100 : 0)
      : Math.round(((thisMonthRev - lastMonthRev) / lastMonthRev) * 100);

    // Daily revenue for last 14 days
    var daily = [];
    for (var di = 0; di < 14; di++) {
      var dayStart = now - (13 - di) * DAY;
      var dayEnd   = dayStart + DAY;
      var dayItems = entries.filter(function(e) { return e.createdTs >= dayStart && e.createdTs < dayEnd; });
      daily.push({
        label:   FMT_DATE.format(new Date(dayStart)).slice(0, 5),
        revenue: dayItems.reduce(function(s, e) { return s + e.revenue; }, 0),
        count:   dayItems.length,
        date:    dayStart,
      });
    }

    // Breakdown by plan type
    var byPlan = {};
    entries.forEach(function(e) {
      var k = e.durLabel;
      if (!byPlan[k]) byPlan[k] = { label: k, count: 0, revenue: 0 };
      byPlan[k].count++;
      byPlan[k].revenue += e.revenue;
    });
    var planBreakdown = Object.keys(byPlan).map(function(k) { return byPlan[k]; })
      .sort(function(a, b) { return b.revenue - a.revenue; });

    // Top earning stores (most revenue generated)
    var topStores = entries.slice()
      .sort(function(a, b) { return b.revenue - a.revenue; })
      .slice(0, 5);

    return {
      totalRev: totalRev, activeRev: activeRev,
      thisMonthRev: thisMonthRev, lastMonthRev: lastMonthRev, growth: growth,
      daily: daily, planBreakdown: planBreakdown, topStores: topStores,
      totalCount: entries.length, activeCount: entries.filter(function(e) { return !isExpired(e.expiryMs); }).length,
    };
  }, [hist]);

  var growthColor = data.growth >= 0 ? T.c.green : T.c.red;
  var growthIcon  = data.growth >= 0 ? "↑" : "↓";

  // Pricing reference card
  var pricingTiers = [
    { dur:"ساعة",   price: PLATFORM_PRICES.hours    },
    { dur:"يوم",    price: PLATFORM_PRICES.days     },
    { dur:"أسبوع",  price: PLATFORM_PRICES.week     },
    { dur:"شهر",    price: PLATFORM_PRICES.month    },
    { dur:"٣ أشهر", price: PLATFORM_PRICES["3month"]},
  ];

  return (
    <div className="analytics-wrap">

      {/* ── KPI Cards ── */}
      <div className="kpi-grid" style={{gridTemplateColumns:"repeat(2,1fr)"}}>
        {[
          { ic:"💰", v:FMT_PRICE.format(data.totalRev)+"ج",      l:"إجمالي إيراداتي",         c:T.c.green  },
          { ic:"📅", v:FMT_PRICE.format(data.thisMonthRev)+"ج",  l:"إيرادات آخر ٣٠ يوم",     c:T.c.amber  },
          { ic:"🟢", v:data.activeCount,                          l:"ستور نشط الآن",            c:T.c.green  },
          { ic:"📈", v:(data.growth>=0?"+":"")+data.growth+"%",  l:"نمو مقارنة بالشهر الماضي", c:growthColor},
        ].map(function(k, i) {
          return (
            <div key={i} className="kpi-card anim-pop" style={{animationDelay: i*0.07+"s"}}>
              <div style={{fontSize:22,marginBottom:T.sp.xs}}>{k.ic}</div>
              <div style={{color:k.c,fontSize:T.fs.xl,fontWeight:900,
                            lineHeight:1.1,fontVariantNumeric:"tabular-nums"}}>
                {k.v}
              </div>
              <div style={{color:T.c.t4,fontSize:T.fs.xs,marginTop:T.sp.xs}}>{k.l}</div>
            </div>
          );
        })}
      </div>

      {/* ── Daily Revenue Chart ── */}
      <div className="analytics-card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:T.sp.sm}}>
          <div>
            <h3 className="analytics-title">إيراداتي اليومية</h3>
            <p className="analytics-sub">
              آخر ٣٠ يوم:{" "}
              <span style={{color:T.c.green,fontWeight:700,fontVariantNumeric:"tabular-nums"}}>
                {FMT_PRICE.format(data.thisMonthRev)} ج
              </span>
              {"  "}
              <span style={{color:growthColor,fontSize:T.fs.xs,fontWeight:700}}>
                {growthIcon} {Math.abs(data.growth)}% مقارنة بالشهر الماضي
              </span>
            </p>
          </div>
        </div>
        <div style={{marginTop:T.sp.base}}>
          <BarChart data={data.daily} color={T.c.green} label="revenue"/>
        </div>
      </div>

      {/* ── Plan Breakdown ── */}
      {data.planBreakdown.length > 0 && (
        <div className="analytics-card">
          <h3 className="analytics-title">📊 توزيع الاشتراكات حسب الباقة</h3>
          <p className="analytics-sub">كم ستور اشترك في كل باقة وما الإيراد منها</p>
          <div style={{display:"flex",flexDirection:"column",gap:0,marginTop:T.sp.base,
                        border:"0.5px solid "+T.c.border,borderRadius:T.r.lg,overflow:"hidden"}}>
            {data.planBreakdown.map(function(p, i) {
              var maxRev = (data.planBreakdown.length > 0 ? data.planBreakdown[0].revenue : 0) || 1;
              var pct    = Math.round(p.revenue / maxRev * 100);
              return (
                <div key={p.label} style={{
                  display:"flex",alignItems:"center",gap:T.sp.md,
                  padding:T.sp.md+"px "+T.sp.base+"px",
                  background: i%2===0?"transparent":"rgba(255,255,255,.015)",
                  borderBottom:"0.5px solid "+T.c.border,
                }}>
                  <span style={{color:T.c.t2,fontWeight:700,fontSize:T.fs.md,minWidth:64}}>{p.label}</span>
                  <div style={{flex:1,height:6,background:"rgba(255,255,255,.06)",borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:3,width:pct+"%",
                                  background:"linear-gradient(90deg,#00f07e,#00c862)",

// ── Platform pricing (per subscription sold to store owners) ──
var PLATFORM_PRICES = {
  hours:    2,    // 2 جنيه / ساعة
  days:     5,    // 5 جنيه / يوم
  week:     30,   // 30 جنيه / أسبوع
  month:    120,  // 120 جنيه / شهر
  "3month": 120 * 3,
  permanent: 0,   // دائم = مجاني / تقديري
};

/**
 * Compute how much revenue this store entry earned the platform owner.
 * Returns { amount, label } — amount in EGP.
 */
function calcPlatformRevenue(h) {
  if (!h || !h.expiryMs) return { amount: 0, label: "دائم" };
  var created = h.createdAt ? new Date(h.createdAt).getTime() : 0;
  if (!created || isNaN(created)) return { amount: 0, label: "غير محدد" };
  var durMs   = h.expiryMs - created;
  if (durMs <= 0 || isNaN(durMs)) return { amount: 0, label: "غير محدد" };
  var durH    = durMs / 3600000;
  var durD    = durMs / 86400000;

  if (durD >= 85)       return { amount: PLATFORM_PRICES["3month"], label: "٣ أشهر" };
  if (durD >= 28)       return { amount: PLATFORM_PRICES.month,     label: "شهر"     };
  if (durD >= 6.5)      return { amount: PLATFORM_PRICES.week,      label: "أسبوع"   };
  if (durH >= 20)       return { amount: Math.round(durD) * PLATFORM_PRICES.days,   label: Math.round(durD) + " يوم" };
  return { amount: Math.round(durH) * PLATFORM_PRICES.hours, label: Math.round(durH) + " ساعة" };
}

function usePriceHistory(storeId) {
  return useMemo(function() {
    var key = "efpricehist" + storeId;
    return {
      record: function(price) {
        dbGet(key).then(function(hist) {
          hist = hist || [];
          var entry = { price: +price, ts: Date.now() };
          dbSet(key, [entry].concat(hist).slice(0, 90));
        });
      },
      load: function() {
        return dbGet(key).then(function(r) { return r || []; });
      },
    };
  }, [storeId]);
}

// ═══════════════════════════════════════════════════════════════
//  LIVE KPI TICKER
//  Shows real-time animated counters in the store header
// ═══════════════════════════════════════════════════════════════
function useAnimatedCount(target, duration) {
  if (duration === undefined) duration = 600;
  var _v = useState(0);
  var val = _v[0], setVal = _v[1];
  var rafRef = useRef(null);
  var startRef = useRef(null);
  var fromRef  = useRef(0);

  useEffect(function() {
    if (target === fromRef.current) return;
    var from = fromRef.current;
    var to   = target;
    // Update fromRef immediately so a rapid next effect reads the correct start value,
    // even if the RAF for this animation hasn't fired yet.
    fromRef.current = to;
    startRef.current = null;

    function step(ts) {
      if (!startRef.current) startRef.current = ts;
      var p = Math.min((ts - startRef.current) / duration, 1);
      // ease-out cubic
      var eased = 1 - Math.pow(1 - p, 3);
      setVal(Math.round(from + (to - from) * eased));
      if (p < 1) { rafRef.current = requestAnimationFrame(step); }
    }
    rafRef.current = requestAnimationFrame(step);
    return function() { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [target, duration]);

  return val;
}

function LiveKPITicker(props) {
  var accs = props.accs;

  var sold    = useMemo(function() { return accs.filter(function(a) { return a.sold; }); }, [accs]);
  var avail   = useMemo(function() { return accs.filter(function(a) { return !a.sold; }); }, [accs]);
  var revenue = useMemo(function() { return sold.reduce(function(s, a) { return s + calcProfit(a); }, 0); }, [sold]);

  var aSold    = useAnimatedCount(sold.length);
  var aAvail   = useAnimatedCount(avail.length);
  var aRevenue = useAnimatedCount(revenue);

  var convRate = accs.length ? Math.round((sold.length / accs.length) * 100) : 0;
  var aConv    = useAnimatedCount(convRate);

  var items = [
    { ic:"✅", val: aAvail,               lbl:"متاح",            c: T.c.green },
    { ic:"💰", val: FMT_PRICE.format(aRevenue) + " ج", lbl:"مكسبك الصافي", c: T.c.amber },

// ═══════════════════════════════════════════════════════════════
//  THEME CONTEXT  (Dark / Light mode)
// ═══════════════════════════════════════════════════════════════
var ThemeContext = createContext("dark");

function useTheme() { return useContext(ThemeContext); }

var LIGHT_OVERRIDES = {
  "--bg":         "#f0f4f8",
  "--surface":    "#ffffff",
  "--surfaceHigh":"#f8fafc",
  "--border":     "rgba(0,0,0,0.08)",
  "--borderHi":   "rgba(0,0,0,0.14)",
  "--t1":         "#0f172a",
  "--t2":         "#334155",
  "--t3":         "#64748b",
  "--t4":         "#94a3b8",
};

function ThemeProvider(props) {
  function _readTheme() {
    try { return localStorage.getItem("ef-theme") || "dark"; } catch(e) {}
    try { return sessionStorage.getItem("ef-theme") || "dark"; } catch(e) {}
    return "dark";
  }
  function _writeTheme(v) {
    try { localStorage.setItem("ef-theme", v); return; } catch(e) {}
    try { sessionStorage.setItem("ef-theme", v); } catch(e) {}
  }
  var _t = useState(function() { return _readTheme(); });
  var theme = _t[0], setTheme = _t[1];

  var toggle = useCallback(function() {
    setTheme(function(t) {
      var next = t === "dark" ? "light" : "dark";
      _writeTheme(next);
      return next;
    });
  }, []);

  useEffect(function() {
    var root = document.documentElement;
    if (theme === "light") {
      Object.keys(LIGHT_OVERRIDES).forEach(function(k) {
        root.style.setProperty(k, LIGHT_OVERRIDES[k]);
      });
      root.setAttribute("data-theme", "light");
    } else {
      Object.keys(LIGHT_OVERRIDES).forEach(function(k) {
        root.style.removeProperty(k);
      });
      root.removeAttribute("data-theme");
    }
  }, [theme]);

  return (
    <ThemeContext.Provider value={{ theme: theme, toggle: toggle }}>
      {props.children}
    </ThemeContext.Provider>
  );
}

      .replace(/&/g, "&amp;")

      .replace(/"/g, "&quot;");
  }
  var rows = available.map(function(a) {
    return "<tr><td>" + calcTotalPrice(a).toLocaleString("ar-EG") + " ج</td>"
      + "<td>" + _esc(a.players) + "</td>"
      + "<td>" + _esc(a.gp) + "</td>"
      + "<td>" + _esc(a.whatsapp) + "</td></tr>";

  var html = "<!DOCTYPE html><html dir='rtl' lang='ar'><head>"
    + "<meta charset='utf-8'><title>" + _esc(storeName) + " — تقرير الحسابات</title>"

// ═══════════════════════════════════════════════════════════════
//  PRICE DISTRIBUTION CHART
//  Shows how prices are distributed across buckets
// ═══════════════════════════════════════════════════════════════
var PriceDistChart = memo(function(props) {
  var accs = props.accs;

  var buckets = useMemo(function() {
    var prices = accs.map(function(a) { return +a.price || 0; }).filter(function(p) { return p > 0; });
    if (!prices.length) return [];
    var mn  = Math.min.apply(null, prices);
    var mx  = Math.max.apply(null, prices);
    var rng = mx - mn;
    if (rng === 0) return [{ label: mn + " ج", count: prices.length, pct: 100 }];

    var BUCKETS = 6;
    var step    = rng / BUCKETS;
    var bkts    = [];
    for (var i = 0; i < BUCKETS; i++) {
      var lo   = mn + i * step;
      var hi   = mn + (i + 1) * step;
      var cnt  = prices.filter(function(p) { return p >= lo && (i === BUCKETS - 1 ? p <= hi : p < hi); }).length;
      bkts.push({
        label: Math.round(lo) + (i < BUCKETS - 1 ? "–" + Math.round(hi) : "+"),
        count: cnt,
      });
    }
    var maxCnt = Math.max.apply(null, [1].concat(bkts.map(function(b) { return b.count; })));
    return bkts.map(function(b) { return Object.assign({}, b, { pct: Math.round(b.count / maxCnt * 100) }); });
  }, [accs]);

  if (!buckets.length) return null;

  return (
    <div className="analytics-card">
      <h3 className="analytics-title">📊 توزيع الأسعار</h3>
      <p className="analytics-sub">كيف تتوزع الأسعار عبر النطاقات السعرية</p>
      <div style={{display:"flex",flexDirection:"column",gap:T.sp.sm,marginTop:T.sp.base}}>
        {buckets.map(function(b, i) {
          return (
            <div key={i} style={{display:"flex",alignItems:"center",gap:T.sp.md}}>
              <span style={{color:T.c.t3,fontSize:T.fs.xs,minWidth:90,textAlign:"left",
                             fontVariantNumeric:"tabular-nums"}}>
                {b.label} ج
              </span>
              <div style={{flex:1,height:20,background:"rgba(255,255,255,.05)",borderRadius:4,overflow:"hidden"}}>
                <div style={{
                  height:"100%",
                  width: b.pct + "%",
                  background: b.pct === 100
                    ? "linear-gradient(90deg,#00f07e,#00c862)"
                    : "linear-gradient(90deg,rgba(0,224,110,.5),rgba(0,200,100,.3))",
                  borderRadius:4,
                  transition:"width .6s cubic-bezier(0.16,1,0.3,1)",
                  display:"flex",alignItems:"center",paddingRight:6,justifyContent:"flex-end",
                }}/>
              </div>
              <span style={{color:T.c.t2,fontSize:T.fs.xs,minWidth:28,textAlign:"left",
                             fontVariantNumeric:"tabular-nums"}}>
                {b.count}
              </span>
            </div>
          );
        })}
      </div>
    </div>
  );
});

// ═══════════════════════════════════════════════════════════════
//  REVENUE FORECAST
//  Simple linear extrapolation of last 7 days → next 7 days
// ═══════════════════════════════════════════════════════════════
function RevenueForecast(props) {
  var accs = props.accs;

  var forecast = useMemo(function() {
    var DAY  = 86400000;
    var now  = Date.now();
    var sold = accs.filter(function(a) { return a.sold; });

    // Last 14 days daily revenue
    var daily = [];
    for (var di = 0; di < 14; di++) {
      var dayStart = now - (13 - di) * DAY;
      var dayEnd   = dayStart + DAY;
      var rev      = sold
        .filter(function(a) { var ts = a.soldAt || a.createdAt; return ts >= dayStart && ts < dayEnd; })
        .reduce(function(s, a) { return s + calcProfit(a); }, 0);
      daily.push(rev);
    }

    // Simple moving average (last 7 days) as forecast
    var last7   = daily.slice(7);
    var avgDay  = last7.reduce(function(s, v) { return s + v; }, 0) / 7;
    var prev7   = daily.slice(0, 7).reduce(function(s, v) { return s + v; }, 0);
    var next7   = Math.round(avgDay * 7);
    var trend   = prev7 === 0 ? (next7 > 0 ? 100 : 0) : Math.round(((next7 - prev7) / prev7) * 100);

    return { avgDay: Math.round(avgDay), next7: next7, trend: trend, prev7: prev7 };
  }, [accs]);

  var tColor = forecast.trend >= 0 ? T.c.green : T.c.red;
  var tIcon  = forecast.trend >= 0 ? "↑" : "↓";

  return (
    <div className="analytics-card" style={{
      background: "linear-gradient(135deg,rgba(0,100,255,.06),rgba(0,224,110,.04))",
      borderColor: "rgba(0,150,255,.2)"
    }}>
      <div style={{display:"flex",alignItems:"center",gap:T.sp.sm,marginBottom:T.sp.sm}}>
        <span style={{fontSize:24}} aria-hidden="true">🔮</span>
        <div>
          <h3 className="analytics-title">🔮 توقعات مكسبك الأسبوع القادم</h3>
          <p className="analytics-sub">بناءً على متوسط عمولاتك في آخر ٧ أيام</p>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:T.sp.base,marginTop:T.sp.base}}>
        <div style={{textAlign:"center"}}>
          <div style={{color:T.c.green,fontSize:T.fs.xxl,fontWeight:900,
                       fontVariantNumeric:"tabular-nums",lineHeight:1.1}}>
            {FMT_PRICE.format(forecast.next7)}
            <span style={{fontSize:T.fs.xs,opacity:.65,marginRight:3}}>ج</span>
          </div>
          <div style={{color:T.c.t4,fontSize:T.fs.xs,marginTop:T.sp.xs}}>مكسبك المتوقع</div>
        </div>
        <div style={{textAlign:"center"}}>
          <div style={{color:tColor,fontSize:T.fs.xxl,fontWeight:900,
                       fontVariantNumeric:"tabular-nums",lineHeight:1.1}}>
            {tIcon} {Math.abs(forecast.trend)}%
          </div>
          <div style={{color:T.c.t4,fontSize:T.fs.xs,marginTop:T.sp.xs}}>مقارنة بالأسبوع الماضي</div>
        </div>
      </div>
      <div style={{marginTop:T.sp.base,padding:T.sp.sm + "px " + T.sp.md + "px",
                   background:"rgba(255,255,255,.03)",borderRadius:T.r.md,
                   color:T.c.t3,fontSize:T.fs.xs,textAlign:"center"}}>
        متوسط مكسبك اليومي: <strong style={{color:T.c.t1}}>
          {FMT_PRICE.format(forecast.avgDay)} ج/يوم
        </strong>
      </div>
    </div>
  );
}

//  MAINTENANCE MODE SCREEN  (shown to buyers when store is down)
// ═══════════════════════════════════════════════════════════════
function MaintenanceScreen(props) {
  var storeName = props.storeName, cfg = props.cfg, onBack = props.onBack;

  var _left = useState(function() {
    return cfg.returnAt ? Math.max(0, cfg.returnAt - Date.now()) : null;
  });
  var msLeft = _left[0], setMsLeft = _left[1];

  useEffect(function() {
    if (!cfg.returnAt) return;
    var id = setInterval(function() {
      var left = Math.max(0, cfg.returnAt - Date.now());
      setMsLeft(left);
      if (left <= 0) clearInterval(id);
    }, 1000);
    return function() { clearInterval(id); };
  }, [cfg.returnAt]);

  function fmtCountdown(ms) {
    if (!ms || ms <= 0) return null;
    var s = Math.ceil(ms / 1000);
    var m = Math.floor(s / 60);
    var h = Math.floor(m / 60);
    var d = Math.floor(h / 24);
    if (d >= 1) return d + " يوم " + (h % 24) + " ساعة";
    if (h >= 1) return h + " ساعة " + (m % 60) + " دقيقة";
    if (m >= 1) return m + ":" + String(s % 60).padStart(2, "0") + " دقيقة";
    return s + " ثانية";
  }

  return (
    <div className="maint-screen" lang="ar">
      <div className="maint-icon">🔧</div>
      <h1 style={{color:T.c.t1,fontSize:T.fs.xxxl,fontWeight:900,marginBottom:T.sp.md}}>
        <span className="glow-text">⚽ {storeName}</span>
      </h1>
      <h2 style={{color:T.c.amber,fontSize:T.fs.xl,fontWeight:800,marginBottom:T.sp.base}}>
        تحت الصيانة مؤقتاً
      </h2>
      <p style={{color:T.c.t2,fontSize:T.fs.lg,maxWidth:380,lineHeight:1.7,marginBottom:T.sp.xl}}>
        {cfg.message || "نعمل على تحسين الخدمة وإضافة حسابات جديدة. سنعود قريباً!"}
      </p>
      {msLeft > 0 && (
        <div style={{
          background:"rgba(240,160,32,.1)",border:"0.5px solid rgba(240,160,32,.3)",
          borderRadius:T.r.lg,padding:T.sp.md + "px " + T.sp.xl + "px",
          marginBottom:T.sp.xl,
        }}>
          <p style={{color:T.c.t3,fontSize:T.fs.sm,marginBottom:T.sp.xs}}>نعود خلال</p>
          <p style={{color:T.c.amber,fontSize:T.fs.xxl,fontWeight:900,fontVariantNumeric:"tabular-nums"}}>
            {fmtCountdown(msLeft)}
          </p>
        </div>
      )}
      <button className="btn-s" onClick={onBack}
        style={{padding:T.sp.md + "px " + T.sp.xxl + "px",fontSize:T.fs.md}}>
        ← رجوع
      </button>
    </div>
  );
}

var REQ_STATUS_META = {
  new:       { label:"جديد",     color:T.c.green,  bg:"rgba(0,224,110,.1)",  border:"rgba(0,224,110,.25)"  },
  seen:      { label:"تمت رؤيته", color:T.c.amber,  bg:"rgba(240,160,32,.08)", border:"rgba(240,160,32,.2)"  },
  fulfilled: { label:"تم التنفيذ",color:"#60a5fa", bg:"rgba(96,165,250,.08)", border:"rgba(96,165,250,.2)"  },
  rejected:  { label:"مرفوض",    color:T.c.t3,     bg:"rgba(255,255,255,.04)",border:T.c.border             },
};

var REQUEST_FILTERS = [
  { k:"all",       l:"الكل"        },
  { k:"new",       l:"جديد"        },
  { k:"seen",      l:"تمت رؤيته"  },
  { k:"fulfilled", l:"منجز"        },
  { k:"rejected",  l:"مرفوض"      },
];

function AccountRequestsPanel(props) {
  var storeId = props.storeId;
  var accReqs = props.accReqs;
  var push    = useToast();
  var _filter = useState("all"); var filterStatus = _filter[0], setFilterStatus = _filter[1];
  var _confirmDel = useState(null); var confirmDel = _confirmDel[0], setConfirmDel = _confirmDel[1];

  // Mark all new requests as seen when this tab is open.
  // A ref tracks IDs already processed so we never call markSeen twice
  // for the same request, regardless of how many times accReqs.list updates.
  var _seenRef = useRef({});
  useEffect(function() {
    if (!accReqs.list || !accReqs.list.length) return;
    accReqs.list.forEach(function(r) {
      if (r.status === "new" && !_seenRef.current[r.id]) {
        _seenRef.current[r.id] = true;
        accReqs.markSeen(r.id);
      }
    });
  }, [accReqs.list]); // re-run whenever list changes so new arrivals are also marked

  var filtered = useMemo(function() {
    if (filterStatus === "all") return accReqs.list;
    return accReqs.list.filter(function(r) { return r.status === filterStatus; });
  }, [accReqs.list, filterStatus]);

  var counts = useMemo(function() {
    var c = { all: accReqs.list.length, new: 0, seen: 0, fulfilled: 0, rejected: 0 };
    accReqs.list.forEach(function(r) { if (c[r.status] !== undefined) c[r.status]++; });
    return c;
  }, [accReqs.list]);

  if (accReqs.loading) return (
    <div style={{padding:T.sp.xl,textAlign:"center",color:T.c.t3}}>
      <Spinner/> جاري تحميل الطلبات...

  return (
    <div style={{direction:"rtl"}}>
      {/* ── Header ── */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",
                    marginBottom:T.sp.base,flexWrap:"wrap",gap:T.sp.sm}}>
        <div>
          <h2 style={{color:T.c.t1,fontSize:T.fs.lg,fontWeight:800,display:"flex",alignItems:"center",gap:T.sp.sm}}>
            🎯 طلبات الحسابات
            {counts.new > 0 && (
              <span
                aria-live="polite"
                aria-atomic="true"
                style={{background:T.c.red,color:"#fff",borderRadius:T.r.full,
                         padding:"2px 9px",fontSize:T.fs.xs,fontWeight:800}}>
                {counts.new} جديد
              </span>
            )}

          <p style={{color:T.c.t4,fontSize:T.fs.sm,marginTop:2}}>

      </div>

      {/* ── Status Filter Pills ── */}
      <div style={{display:"flex",flexWrap:"wrap",gap:T.sp.xs,marginBottom:T.sp.base}}>
        {REQUEST_FILTERS.map(function(f) {
          var cnt = counts[f.k];

            <button key={f.k} type="button"

              style={{
                padding:T.sp.xs + "px " + T.sp.sm + "px",
                borderRadius:T.r.full,
                border:"0.5px solid " + (filterStatus === f.k ? T.c.greenRing : T.c.border),

                color: filterStatus === f.k ? T.c.green : T.c.t3,
                fontSize:T.fs.xs,fontFamily:"Cairo,sans-serif",fontWeight:600,
                cursor:"pointer",transition:"all .14s",touchAction:"manipulation",

        <div style={{display:"flex",flexDirection:"column",gap:T.sp.md}}>
          {filtered.map(function(r) {
            var meta   = REQ_STATUS_META[r.status] || REQ_STATUS_META.seen;

            var waMsg  = "مرحباً " + (r.name || "عزيزي") + "، رأيت طلبك لحساب إي فوتبول";
            if (r.players) waMsg += " بلاعبين: " + r.players;
            if (r.minPrice || r.maxPrice) {
              waMsg += " بسعر ";
              if (r.minPrice) waMsg += r.minPrice;
              if (r.maxPrice) waMsg += "–" + r.maxPrice;
              waMsg += " ج";
            }
            if (r.minGp) waMsg += " ورصيد: " + r.minGp;
            waMsg += ". هل لا زلت مهتماً؟";

            var isDelConfirm = confirmDel === r.id;

            return (
              <div key={r.id}
                className="anim-pop"
                style={{
                  background: r.status === "new"
                    ? "linear-gradient(160deg,rgba(0,224,110,.07)," + T.c.surface + ")"
                    : "linear-gradient(160deg," + T.c.surfaceHigh + "," + T.c.surface + ")",
                  border:"0.5px solid " + meta.border,
                  borderRadius:T.r.lg,
                  padding:T.sp.base + "px",
                  transition:"border-color .2s",

                {/* ── Top row: name + status + time ── */}
                <div style={{display:"flex",justifyContent:"space-between",
                              alignItems:"flex-start",flexWrap:"wrap",gap:T.sp.sm,
                              marginBottom:T.sp.sm}}>
                  <div style={{display:"flex",alignItems:"center",gap:T.sp.sm,flexWrap:"wrap"}}>
                    <span style={{color:T.c.t1,fontWeight:800,fontSize:T.fs.md}}>
                      {r.name || "عميل مجهول"}

                    <span style={{
                      padding:"2px 10px",borderRadius:T.r.full,
                      background:meta.bg,border:"0.5px solid " + meta.border,
                      color:meta.color,fontSize:T.fs.xs,fontWeight:700,
                    }}>
                      {meta.label}
                    </span>
                    {r.status === "new" && (
                      <span style={{width:7,height:7,borderRadius:"50%",

                    )}
                  </div>
                  <time style={{color:T.c.t4,fontSize:T.fs.xs,flexShrink:0}}>
                    {FMT_DT.format(new Date(r.ts))}

                </div>

                {/* ── Requirements grid ── */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",
                              gap:T.sp.sm,marginBottom:T.sp.sm}}>
                  {r.players && (
                    <div style={{background:"rgba(255,255,255,.035)",borderRadius:T.r.sm,
                                  padding:T.sp.xs + "px " + T.sp.sm + "px"}}>
                      <div style={{color:T.c.t4,fontSize:10,marginBottom:2}}>⭐ اللاعبون</div>
                      <div style={{color:T.c.t1,fontSize:T.fs.sm,fontWeight:600,
                                    wordBreak:"break-word"}}>{r.players}</div>
                    </div>
                  )}
                  {(r.minPrice > 0 || r.maxPrice > 0) && (
                    <div style={{background:"rgba(255,255,255,.035)",borderRadius:T.r.sm,
                                  padding:T.sp.xs + "px " + T.sp.sm + "px"}}>
                      <div style={{color:T.c.t4,fontSize:10,marginBottom:2}}>💰 نطاق السعر</div>
                      <div style={{color:T.c.green,fontSize:T.fs.sm,fontWeight:700,
                                    fontVariantNumeric:"tabular-nums"}}>
                        {r.minPrice > 0 ? FMT_PRICE.format(r.minPrice) : "أي"} —{" "}
                        {r.maxPrice > 0 ? FMT_PRICE.format(r.maxPrice) + " ج" : "أي سعر"}
                      </div>
                    </div>
                  )}
                  {r.minGp && (
                    <div style={{background:"rgba(255,255,255,.035)",borderRadius:T.r.sm,
                                  padding:T.sp.xs + "px " + T.sp.sm + "px"}}>
                      <div style={{color:T.c.t4,fontSize:10,marginBottom:2}}>🎮 رصيد GP</div>
                      <div style={{color:T.c.amber,fontSize:T.fs.sm,fontWeight:600}}>{r.minGp}</div>
                    </div>
                  )}
                  {r.whatsapp && (
                    <div style={{background:"rgba(255,255,255,.035)",borderRadius:T.r.sm,
                                  padding:T.sp.xs + "px " + T.sp.sm + "px"}}>
                      <div style={{color:T.c.t4,fontSize:10,marginBottom:2}}>📱 واتساب</div>
                      <div style={{color:T.c.t2,fontSize:T.fs.sm,fontWeight:600,
                                    fontVariantNumeric:"tabular-nums",direction:"ltr",
                                    textAlign:"right"}}>{r.whatsapp}</div>
                    </div>
                  )}
                </div>

                {/* ── Note ── */}
                {r.note && (
                  <div style={{
                    padding:T.sp.sm + "px " + T.sp.md + "px",
                    background:"rgba(255,255,255,.025)",borderRadius:T.r.sm,
                    marginBottom:T.sp.sm,
                    borderRight:"2px solid " + T.c.amber,
                  }}>
                    <span style={{color:T.c.t4,fontSize:T.fs.xs}}>ملاحظة: </span>
                    <span style={{color:T.c.t2,fontSize:T.fs.sm}}>{r.note}</span>
                  </div>
                )}

                {/* ── Action row ── */}
                <div style={{display:"flex",flexWrap:"wrap",gap:T.sp.sm,alignItems:"center"}}>
                  {/* WhatsApp quick reply */}
                  {waNum && (
                    <a href={"https://wa.me/" + waNum + "?text=" + encodeURIComponent(waMsg)}
                      target="_blank" rel="noreferrer"
                      className="btn-p"
                      style={{padding:T.sp.xs + "px " + T.sp.md + "px",fontSize:T.fs.xs,
                              textDecoration:"none",display:"inline-flex",alignItems:"center",gap:4,
                              background:"linear-gradient(135deg,#25d366,#1da851)"}}>
                      💬 رد عبر واتساب
                    </a>
                  )}
                  {/* Status buttons */}
                  {r.status !== "fulfilled" && (
                    <button className="btn-s"
                      onClick={function() { accReqs.setStatus(r.id, "fulfilled"); push("✅ تم تمييزه كمنجز", "success"); }}
                      style={{padding:T.sp.xs + "px " + T.sp.sm + "px",fontSize:T.fs.xs,
                              color:"#60a5fa",borderColor:"rgba(96,165,250,.3)"}}>
                      ✔ تم التنفيذ
                    </button>
                  )}
                  {r.status !== "rejected" && (
                    <button className="btn-s"
                      onClick={function() { accReqs.setStatus(r.id, "rejected"); push("تم تمييزه كمرفوض", "warn"); }}
                      style={{padding:T.sp.xs + "px " + T.sp.sm + "px",fontSize:T.fs.xs}}>
                      ✗ رفض
                    </button>
                  )}
                  {(r.status === "fulfilled" || r.status === "rejected") && (
                    <button className="btn-s"
                      onClick={function() { accReqs.setStatus(r.id, "seen"); }}
                      style={{padding:T.sp.xs + "px " + T.sp.sm + "px",fontSize:T.fs.xs}}>
                      ↩ إعادة فتح
                    </button>
                  )}
                  {/* Delete with confirm */}
                  <div style={{marginRight:"auto",display:"flex",gap:T.sp.xs}}>
                    {isDelConfirm ? (
                      <React.Fragment>
                        <button className="btn-d"
                          onClick={function() {
                            accReqs.remove(r.id);
                            setConfirmDel(null);
                            push("تم حذف الطلب", "warn");
                          }}
                          style={{padding:T.sp.xs + "px " + T.sp.sm + "px",fontSize:T.fs.xs}}>
                          تأكيد الحذف
                        </button>
                        <button className="btn-s"
                          onClick={function() { setConfirmDel(null); }}
                          style={{padding:T.sp.xs + "px " + T.sp.sm + "px",fontSize:T.fs.xs}}>
                          إلغاء
                        </button>
                      </React.Fragment>
                    ) : (
                      <button className="btn-d"
                        onClick={function() { setConfirmDel(r.id); }}
                        style={{padding:T.sp.xs + "px " + T.sp.sm + "px",fontSize:T.fs.xs}}>
                        🗑️
                      </button>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  BUYER REQUEST BANNER  (buyer side — shown above the accounts grid)
//  A compact floating button that opens the full request modal.
//  Always visible so buyers can request specific accounts even
//  when browsing existing listings.
// ═══════════════════════════════════════════════════════════════
function BuyerRequestBanner(props) {
  var storeId  = props.storeId;
  var onSubmit = props.onSubmit; // receives entry — calls AccountRequestAPI.add
  var _open      = useState(false); var open      = _open[0],      setOpen      = _open[1];
  // Per-session submitted flag — persisted in sessionStorage so it survives
  // re-renders but resets when the buyer closes and reopens the page.
  var _submitted = useState(function() {
    try { return !!sessionStorage.getItem("ef:req:submitted:" + storeId); } catch(e) { return false; }
  });
  var submitted = _submitted[0], setSubmitted = _submitted[1];

  function handleSubmitDone() {
    try { sessionStorage.setItem("ef:req:submitted:" + storeId, "1"); } catch(e) {}
    setSubmitted(true);
    setOpen(false);
  }

  // Submitted state — show confirmation banner instead of CTA
  if (submitted) {
    return (
      <div style={{
        display:"flex",alignItems:"center",gap:T.sp.md,
        flexWrap:"wrap",
        background:"rgba(0,224,110,.05)",
        border:"0.5px solid rgba(0,224,110,.18)",
        borderRadius:T.r.lg,padding:T.sp.md + "px " + T.sp.base + "px",
        marginBottom:T.sp.base,
      }}>
        <span style={{fontSize:22}}>✅</span>
        <div style={{flex:1,minWidth:0}}>
          <p style={{color:T.c.green,fontWeight:700,fontSize:T.fs.md,lineHeight:1.3}}>
            طلبك قيد المراجعة
          </p>
          <p style={{color:T.c.t3,fontSize:T.fs.sm,marginTop:2}}>
            سيتواصل معك البائع على واتساب فور توفر حساب مناسب
          </p>
        </div>
        <button className="btn-s"
          onClick={function() {
            try { sessionStorage.removeItem("ef:req:submitted:" + storeId); } catch(e) {}
            setSubmitted(false);
          }}
          style={{padding:T.sp.xs + "px " + T.sp.sm + "px",fontSize:T.fs.xs,flexShrink:0}}>
          تعديل الطلب
        </button>
      </div>
    );
  }

  return (
    <React.Fragment>
      <div style={{
        display:"flex",alignItems:"center",justifyContent:"space-between",
        flexWrap:"wrap",gap:T.sp.sm,
        background:"linear-gradient(135deg,rgba(0,224,110,.06),rgba(0,100,255,.04))",
        border:"0.5px solid rgba(0,224,110,.18)",
        borderRadius:T.r.lg,padding:T.sp.md + "px " + T.sp.base + "px",
        marginBottom:T.sp.base,
      }}>
        <div style={{display:"flex",alignItems:"center",gap:T.sp.sm}}>
          <span style={{fontSize:22}}>🎯</span>
          <div>
            <p style={{color:T.c.t1,fontWeight:700,fontSize:T.fs.md,lineHeight:1.3}}>
              لم تجد الحساب المناسب؟
            </p>
            <p style={{color:T.c.t3,fontSize:T.fs.sm,marginTop:2}}>
              اطلب حساباً بمتطلباتك وسنتواصل معك فور التوفر
            </p>
          </div>
        </div>
        <button className="btn-p"
          onClick={function() { setOpen(true); }}
          style={{padding:T.sp.sm + "px " + T.sp.xl + "px",fontSize:T.fs.md,flexShrink:0}}>
          🎯 اطلب حساباً
        </button>
      </div>
      {open && (
        <AccountRequestModal
          storeId={storeId}
          onSubmit={onSubmit}
          onClose={function() { setOpen(false); }}
          onSubmitDone={handleSubmitDone}/>
      )}
    </React.Fragment>
  );
}

// ═══════════════════════════════════════════════════════════════
//  ACCOUNT REQUEST MODAL  (buyer side — full request form)
//  Multi-step UX: buyer fills requirements → confirmation screen.
//  Fields: name, whatsapp (required), players, price range,
//          min GP/Coins, free-text note.
//  Full validation + duplicate detection + sanitization.
// ═══════════════════════════════════════════════════════════════
function AccountRequestModal(props) {
  var storeId      = props.storeId;
  var onSubmit     = props.onSubmit;     // (entry) => Promise<{added,reason}>
  var onClose      = props.onClose;
  var onSubmitDone = props.onSubmitDone; // called when submit succeeds
  var push         = useToast();

  var _name     = useState(""); var name     = _name[0],     setName     = _name[1];
  var _wa       = useState(""); var wa       = _wa[0],       setWa       = _wa[1];
  var _players  = useState(""); var players  = _players[0],  setPlayers  = _players[1];
  var _minPrice = useState(""); var minPrice = _minPrice[0], setMinPrice = _minPrice[1];
  var _maxPrice = useState(""); var maxPrice = _maxPrice[0], setMaxPrice = _maxPrice[1];
  var _minGp    = useState(""); var minGp    = _minGp[0],    setMinGp    = _minGp[1];
  var _note     = useState(""); var note     = _note[0],     setNote     = _note[1];
  var _err      = useState(""); var err      = _err[0],      setErr      = _err[1];
  var _busy     = useState(false); var busy  = _busy[0],     setBusy     = _busy[1];
  var _done     = useState(false); var done  = _done[0],     setDone     = _done[1];

  // Close on Escape
  useEffect(function() {
    function h(e) { if (e.key === "Escape") onClose(); }
    window.addEventListener("keydown", h, true);
    return function() { window.removeEventListener("keydown", h, true); };
  }, [onClose]);

  // Trap scroll behind modal
  useEffect(function() {
    var prev = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    return function() { document.body.style.overflow = prev; };
  }, []);

  function validate() {
    if (!wa.trim()) { setErr("رقم الواتساب مطلوب للتواصل معك"); return false; }
    if (wa.replace(/[^0-9]/g, "").length < 7) { setErr("رقم الواتساب يبدو غير صحيح — تحقق منه"); return false; }
    if (!players.trim() && !minPrice && !maxPrice && !minGp && !note.trim()) {
      setErr("يُرجى تحديد متطلب واحد على الأقل — لاعبون أو سعر أو رصيد أو ملاحظة"); return false;
    }
    var minP = parseInt(minPrice) || 0;
    var maxP = parseInt(maxPrice) || 0;
    if (minP > 0 && maxP > 0 && minP > maxP) {
      setErr("الحد الأدنى للسعر لا يمكن أن يتجاوز الحد الأقصى"); return false;
    }
    if (minP < 0 || maxP < 0) {
      setErr("السعر لا يمكن أن يكون سالباً"); return false;
    }
    return true;
  }

  function submit() {
    setErr("");
    if (!validate()) return;
    setBusy(true);
    onSubmit({
      name:     name.trim() || "عميل",
      whatsapp: wa.trim(),
      players:  players.trim(),
      minPrice: minPrice,
      maxPrice: maxPrice,
      minGp:    minGp.trim(),
      note:     note.trim(),
    }).then(function(res) {
      setBusy(false);
      if (res.added) {
        setDone(true);
        push("✅ تم إرسال طلبك!", "success");
        if (onSubmitDone) onSubmitDone();
      } else {
        setErr("لديك بالفعل طلب نشط — انتظر رد البائع قبل إرسال طلب آخر");
      }
    }).catch(function() { setBusy(false); setErr("حدث خطأ، حاول مجدداً"); });
  }

  return (
    <div className="modal-overlay" onClick={function(e) { if (e.target === e.currentTarget) onClose(); }}
      role="dialog" aria-modal="true" aria-label="طلب حساب محدد">
      <div className="modal-box" style={{maxWidth:480,width:"100%"}}>

        {/* ── Header ── */}
        <div className="modal-hd">
          <div>
            <h2 style={{color:T.c.t1,fontSize:T.fs.xl,fontWeight:900}}>
              🎯 اطلب حساباً محدداً
            </h2>
            <p style={{color:T.c.t3,fontSize:T.fs.sm,marginTop:4}}>
              حدِّد متطلباتك وسيتواصل معك البائع فور توفر الحساب
            </p>
          </div>
          <button className="modal-close" onClick={onClose} aria-label="إغلاق">✕</button>
        </div>

        {done ? (
          /* ── Success Screen ── */
          <div style={{padding:T.sp.xl + "px",textAlign:"center"}}>
            <div style={{fontSize:56,marginBottom:T.sp.base,
                          animation:"ef-float 2s ease-in-out infinite"}}>✅</div>
            <h3 style={{color:T.c.green,fontSize:T.fs.xl,fontWeight:900,marginBottom:T.sp.sm}}>
              تم إرسال طلبك بنجاح!
            </h3>
            <p style={{color:T.c.t2,fontSize:T.fs.md,lineHeight:1.8,marginBottom:T.sp.xl}}>
              سيراجع البائع طلبك ويتواصل معك على واتساب فور توفر حساب يناسب متطلباتك.
            </p>
            <button className="btn-p" onClick={onClose}
              style={{padding:T.sp.md + "px " + T.sp.xxl + "px",fontSize:T.fs.lg}}>
              ← حسناً
            </button>
          </div>
        ) : (
          /* ── Form ── */
          <div style={{padding:T.sp.xl + "px",display:"flex",flexDirection:"column",gap:T.sp.base}}>

            {/* Contact info */}
            <div style={{
              background:"rgba(0,224,110,.04)",border:"0.5px solid rgba(0,224,110,.15)",
              borderRadius:T.r.md,padding:T.sp.md + "px",
            }}>
              <p style={{color:T.c.green,fontSize:T.fs.xs,fontWeight:700,marginBottom:T.sp.sm}}>
                معلومات التواصل
              </p>
              <div style={{display:"flex",flexDirection:"column",gap:T.sp.sm}}>
                <div>
                  <label className="lbl">اسمك (اختياري)</label>
                  <input className="inp"
                    placeholder="مثال: أحمد"
                    value={name}
                    maxLength={60}
                    onChange={function(e) { setName(e.target.value); }}/>
                </div>
                <div>
                  <label className="lbl">
                    رقم واتساب <span style={{color:T.c.red}}>*</span>
                  </label>
                  <input className="inp"
                    placeholder="01012345678"
                    value={wa}
                    inputMode="tel"
                    maxLength={16}
                    onChange={function(e) { setWa(e.target.value); }}/>
                </div>
              </div>
            </div>

            {/* Account requirements */}
            <div>
              <p style={{color:T.c.t2,fontSize:T.fs.xs,fontWeight:700,marginBottom:T.sp.sm}}>
                متطلبات الحساب (حدِّد واحداً على الأقل)
              </p>
              <div style={{display:"flex",flexDirection:"column",gap:T.sp.sm}}>

                {/* Players */}
                <div>
                  <label className="lbl">⭐ اللاعبون المطلوبون</label>
                  <input className="inp"
                    placeholder="مثال: ميسي، مبابي، رونالدو"
                    value={players}
                    maxLength={200}
                    onChange={function(e) { setPlayers(e.target.value); }}/>
                  <p style={{color:T.c.t4,fontSize:T.fs.xs,marginTop:3}}>
                    افصل بين الأسماء بفاصلة
                  </p>
                </div>

                {/* Price range */}
                <div>
                  <label className="lbl">💰 نطاق السعر (جنيه)</label>
                  <div style={{display:"flex",gap:T.sp.sm,alignItems:"center"}}>
                    <input className="inp" type="number" min="0"

// ═══════════════════════════════════════════════════════════════
//  SALE SPEED BADGE  (shows how fast accounts sell)
// ═══════════════════════════════════════════════════════════════
function SaleSpeedBadge(props) {
  var accs = props.accs;
  var speed = useMemo(function() {
    var sold = accs.filter(function(a) { return a.sold && a.createdAt; });
    if (sold.length < 2) return null;
    var now = Date.now();
    // Use soldAt (actual sale time) with createdAt as fallback for legacy data.
    // Only consider accounts sold in last 30 days.
    var recent = sold.filter(function(a) {
      var saleTs = a.soldAt || a.createdAt;
      return now - saleTs < 30 * 86400000;
    });
    if (!recent.length) return null;
    // Measure time-to-sell: elapsed between listing and actual sale.
    var avgHours = recent.reduce(function(s, a) {
      var saleTs  = a.soldAt || a.createdAt;
      var listedTs = a.createdAt || saleTs;
      return s + (saleTs - listedTs) / 3600000;
    }, 0) / recent.length;
    if (avgHours < 24)  return { label: "🔥 يُباع خلال ساعات",  cls:"speed-hot"  };
    if (avgHours < 72)  return { label: "⚡ يُباع خلال أيام",   cls:"speed-warm" };
    return { label: "📦 مبيعات منتظمة", cls:"speed-cool" };
  }, [accs]);

  if (!speed) return null;
  return <span className={"speed-badge " + speed.cls}>{speed.label}</span>;
}

// ═══════════════════════════════════════════════════════════════
//  PRICE RECOMMENDATION  (shown in AccModal based on analytics)
// ═══════════════════════════════════════════════════════════════
function PriceRecommendation(props) {
  var accs = props.accs;
  var rec = useMemo(function() {
    var sold = accs.filter(function(a) { return a.sold; });
    if (sold.length < 3) return null;
    var prices = sold.map(function(a) { return calcTotalPrice(a); }).sort(function(a,b){return a-b;});
    var p25 = prices[Math.floor(prices.length * 0.25)];
    var p75 = prices[Math.floor(prices.length * 0.75)];
    var avg = Math.round(prices.reduce(function(s,p){return s+p;},0) / prices.length);
    return { min: p25, max: p75, avg: avg };
  }, [accs]);

  if (!rec) return null;
  return (
    <div className="price-rec">
      <span>💡</span>
      <span>
        النطاق الأكثر مبيعاً:{" "}
        <strong style={{color:T.c.green}}>{FMT_PRICE.format(rec.min)}–{FMT_PRICE.format(rec.max)} ج</strong>
        {" · "}متوسط:{" "}
        <strong style={{color:T.c.amber}}>{FMT_PRICE.format(rec.avg)} ج</strong>
      </span>
    </div>
  );
}

//  ACCOUNT COMPARISON TRAY + TABLE

// ═══════════════════════════════════════════════════════════════
var CompareContext = createContext({ items:[], add:function(){}, remove:function(){}, clear:function(){} });

function CompareProvider(props) {
  var _items = useState([]); var items = _items[0], setItems = _items[1];

  var add = useCallback(function(acc) {
    setItems(function(prev) {
      if (prev.length >= 3) return prev;
      if (prev.some(function(a) { return a.id === acc.id; })) return prev;
      return prev.concat([acc]);
    });
  }, []);

  var remove = useCallback(function(id) {
    setItems(function(prev) { return prev.filter(function(a) { return a.id !== id; }); });
  }, []);

  var clear = useCallback(function() { setItems([]); }, []);

  return (
    <CompareContext.Provider value={{ items:items, add:add, remove:remove, clear:clear }}>
      {props.children}

  );
}

// ═══════════════════════════════════════════════════════════════
//  PRICE RANGE SLIDER FILTER
// ═══════════════════════════════════════════════════════════════
function PriceSlider(props) {
  var accs = props.accs, minP = props.minP, maxP = props.maxP;
  var setMinP = props.setMinP, setMaxP = props.setMaxP;

  var bounds = useMemo(function() {
    var prices = accs.map(function(a) { return calcTotalPrice(a); }).filter(function(p) { return p > 0; });
    if (!prices.length) return { lo:0, hi:1000 };
    return { lo: Math.floor(Math.min.apply(null, prices)), hi: Math.ceil(Math.max.apply(null, prices)) };
  }, [accs]);

  var lo = (minP !== "" && minP !== null && minP !== undefined) ? +minP : bounds.lo;
  var hi = (maxP !== "" && maxP !== null && maxP !== undefined) ? +maxP : bounds.hi;

  if (bounds.lo === bounds.hi) return null;

  return (
    <div style={{padding:T.sp.sm + "px 0",minWidth:200}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:T.sp.xs}}>
        <span style={{color:T.c.t3,fontSize:T.fs.xs}}>فلتر السعر</span>
        <span style={{color:T.c.green,fontSize:T.fs.xs,fontVariantNumeric:"tabular-nums",fontWeight:700}}>
          {FMT_PRICE.format(lo)} – {FMT_PRICE.format(hi)} ج
        </span>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:T.sp.xs}}>
        <input type="range" className="slider"
          min={bounds.lo} max={bounds.hi}
          value={lo}
          onChange={function(e) { setMinP(String(+e.target.value)); }}
          aria-label="أدنى سعر"/>
        <input type="range" className="slider"
          min={bounds.lo} max={bounds.hi}
          value={hi}
          onChange={function(e) { setMaxP(String(+e.target.value)); }}
          aria-label="أقصى سعر"/>
      </div>
    </div>
  );
}

function ImageUploader(props) {
  var accId     = props.accId;
  var storeId   = props.storeId;
  var storeName = props.storeName;
  var onSaved   = props.onSaved; // callback(dataUrl)

  var _img  = useState(null);  var img  = _img[0],  setImg  = _img[1];
  var _busy = useState(false); var busy = _busy[0], setBusy = _busy[1];
  var _err  = useState("");    var err  = _err[0],  setErr  = _err[1];
  var _pos  = useState("bottomRight"); var pos = _pos[0], setPos = _pos[1];
  var fileRef = useRef(null);

  // Load existing image on mount
  useEffect(function() {
    if (!accId) return;
    ImageDB.load("img-" + storeId + "-" + accId).then(function(d) {
      if (d) setImg(d);
    }).catch(function(){});
  }, [accId, storeId]);

  function handleFile(file) {
    if (!file) return;
    setBusy(true); setErr("");
    WatermarkAPI.fromFile(file, storeName || "eFootball Store", { position: pos })
      .then(function(dataUrl) {

          .then(function() { return dataUrl; }); // pass dataUrl to next .then
      })
      .then(function(dataUrl) {

        setBusy(false);
        setErr(e.message || "فشل رفع الصورة");
      });
  }

    setImg(null);
    ImageDB.remove("img-" + storeId + "-" + accId).catch(function(){});
    if (onSaved) onSaved(null);
  }

    <div style={{marginTop:T.sp.md}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:T.sp.sm}}>

  }, []);

  var goHome = useCallback(function(exp) {
    setExpired(!!exp);
    setScreen({type:"home"});
  }, []);

  var handleExp   = useCallback(function() { goHome(true); }, [goHome]);
  var handleEnter = useCallback(function(s) { setExpired(false); setScreen(s); }, []);

  return (
    <ErrorBoundary>
      <ThemeProvider>
        <ToastProvider>
          {screen.type === "home"  && <Home onEnter={handleEnter} expired={expired}/>}
          {screen.type === "store" && (
            <StoreView
              token={screen.token}
              storeName={screen.storeName}
              onBack={function() { goHome(false); }}
              onExpired={handleExp}/>
          )}
          {screen.type === "super" && <SuperAdmin onBack={function() { goHome(false); }}/>}
        </ToastProvider>
      </ThemeProvider>
    </ErrorBoundary>
  );
}

// ═══════════════════════════════════════════════════════════════
//  RENDER ENTRY POINT — Mount React app to #root
// ═══════════════════════════════════════════════════════════════
(function() {
  var container = document.getElementById('root');
  if (!container) { console.error('[eFootball] #root element not found'); return; }
  try {
    var root = ReactDOM.createRoot(container);
    root.render(React.createElement(App, null));
  } catch(e) {
    console.error('[eFootball] Failed to mount app:', e);
    container.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#020a16;color:#f03c3c;font-family:Cairo,sans-serif;font-size:18px;text-align:center;direction:rtl;padding:24px">⚠️ فشل تحميل التطبيق — يُرجى إعادة تحميل الصفحة.</div>';
  }
})();

    // ─────────────────────────────────────────────────────────────
    // LOADING SCREEN REMOVAL — Hide loading screen after mount
    // ─────────────────────────────────────────────────────────────
  </script>

  <!-- ═══════════════════════════════════════════════════════════
       POST-MOUNT CLEANUP — Hide loading screen after React mounts
       Uses MutationObserver to detect when #root has children.
       ═══════════════════════════════════════════════════════════ -->
  <script>
    /* ── Loading Screen Controller ── */
    (function() {
      var loadingScreen = document.getElementById('loading-screen');
      var loaderText    = loadingScreen ? loadingScreen.querySelector('.ef-loader-text') : null;
      var root          = document.getElementById('root');
      if (!loadingScreen || !root) return;

      function hideLoader() {
        loadingScreen.classList.add('hidden');
        if (observer) { try { observer.disconnect(); } catch(e) {} }
      }

      function showError(msg) {
        if (loaderText) loaderText.textContent = msg;
        // Stop the loading animation
        var fill = loadingScreen.querySelector('.ef-loader-fill');
        if (fill) fill.style.animation = 'none';
        var ball = loadingScreen.querySelector('.ef-loader-ball');
        if (ball) ball.style.animation = 'none';
        if (loaderText) loaderText.style.color = '#f03c3c';
        if (observer) { try { observer.disconnect(); } catch(e) {} }
        clearTimeout(failTimeout);
      }

      // Observe #root for React mount (child insertion)
      var observer;
      try {
        observer = new MutationObserver(function(mutations) {
          if (mutations.some(function(m) { return m.addedNodes.length > 0; }) || root.children.length > 0) {
            clearTimeout(failTimeout);
            hideLoader();
          }
        });
        observer.observe(root, { childList: true, subtree: false });
      } catch(e) {
        // MutationObserver unavailable — rare in modern browsers, fall through to timeout
      }

      // CRITICAL: If already mounted before observer attached (fast machines / cached builds)
      if (root.children.length > 0) {
        hideLoader();
        return;
      }

      // Failure detection: if CDN fails or Babel throws, show error instead of blank spinner
      var failTimeout = setTimeout(function() {
        if (window.__CDN_FAIL || loadingScreen.dataset.error === 'cdn') {
          showError('فشل تحميل المكتبات — تحقق من الاتصال بالإنترنت');
        } else if (root.children.length === 0) {
          showError('تعذّر تشغيل التطبيق — أعد تحميل الصفحة');
        } else {
          hideLoader();
        }
      }, 8000);

    })();
  </script>
